<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Radial Bar — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 24px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 500px;
            margin: 0 auto
        }

        canvas {
            display: block
        }

        .tooltip {
            position: fixed;
            background: rgba(14, 17, 22, .95);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: .8rem;
            color: #E2E8F0;
            pointer-events: none;
            opacity: 0;
            transition: opacity .15s;
            z-index: 10;
            backdrop-filter: blur(8px)
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 9 · Radial Bar</div>
        <h1>Polar Rose <span>of Loss</span></h1>
        <p>Each bar radiates from center. Length = hours consumed. Grouped and colored by OEE category. Concentric rings
            show hour increments.</p>
    </div>
    <canvas id="chart"></canvas>
    <div class="tooltip" id="tip"></div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const tip = document.getElementById('tip');
        const DPR = window.devicePixelRatio || 1;
        const SIZE = 700;
        canvas.width = SIZE * DPR; canvas.height = SIZE * DPR;
        canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
        ctx.scale(DPR, DPR);
        const CX = SIZE / 2, CY = SIZE / 2;
        const TAU = Math.PI * 2;

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        const items = [
            // Availability group
            { name: 'Planning Efficiency', val: 28, color: '#CA8A04', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Operator Discipline', val: 14, color: '#FBBF24', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Op. Resolution Time', val: 58, color: '#FB923C', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Op. Evaluation Time', val: 10, color: '#FB7185', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Tech Response Time', val: 16, color: '#EF4444', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Active Wrench Time', val: 38, color: '#10B981', group: 'Availability', groupColor: '#F59E0B' },
            { name: 'Inactive Wrench Time', val: 22, color: '#EAB308', group: 'Availability', groupColor: '#F59E0B' },
            // Performance group
            { name: 'Interruptions', val: 24, color: '#60A5FA', group: 'Performance', groupColor: '#3B82F6' },
            { name: 'True Speed', val: 48, color: '#6366F1', group: 'Performance', groupColor: '#3B82F6' },
            // Quality group
            { name: 'Startup Rejects', val: 14, color: '#A855F7', group: 'Quality', groupColor: '#8B5CF6' },
            { name: 'In-Process Rejects', val: 12, color: '#EC4899', group: 'Quality', groupColor: '#8B5CF6' },
        ];

        const n = items.length;
        const maxVal = 60; // max bar length reference
        const innerR = 80;
        const maxR = SIZE / 2 - 70;
        const barAngle = TAU / n;
        const barGap = 0.04;

        const bars = items.map((item, i) => {
            const a0 = -Math.PI / 2 + i * barAngle + barGap / 2;
            const a1 = -Math.PI / 2 + (i + 1) * barAngle - barGap / 2;
            const r = innerR + (item.val / maxVal) * (maxR - innerR);
            return { ...item, a0, a1, r, idx: i };
        });

        let hovered = null;

        function render() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // Concentric grid rings
            [10, 20, 30, 40, 50, 60].forEach(v => {
                const r = innerR + (v / maxVal) * (maxR - innerR);
                ctx.beginPath();
                ctx.arc(CX, CY, r, 0, TAU);
                ctx.strokeStyle = 'rgba(255,255,255,.04)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Ring label
                ctx.fillStyle = '#1E293B';
                ctx.font = "400 8px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(v + 'h', CX, CY - r - 2);
            });

            // Group arcs (background sectors)
            let groupStart = 0;
            let currentGroup = items[0].group;
            items.forEach((item, i) => {
                if (item.group !== currentGroup || i === items.length - 1) {
                    const endIdx = item.group !== currentGroup ? i - 1 : i;
                    const ga0 = -Math.PI / 2 + groupStart * barAngle;
                    const ga1 = -Math.PI / 2 + (endIdx + 1) * barAngle;
                    ctx.beginPath();
                    ctx.moveTo(CX, CY);
                    ctx.arc(CX, CY, maxR + 8, ga0, ga1);
                    ctx.closePath();
                    ctx.fillStyle = hexRGBA(items[groupStart].groupColor, 0.03);
                    ctx.fill();

                    // Group label
                    const midA = (ga0 + ga1) / 2;
                    const labelR = maxR + 30;
                    ctx.save();
                    ctx.translate(CX + Math.cos(midA) * labelR, CY + Math.sin(midA) * labelR);
                    let rot = midA;
                    if (rot > Math.PI / 2 && rot < Math.PI * 1.5) rot += Math.PI;
                    ctx.rotate(rot);
                    ctx.fillStyle = hexRGBA(items[groupStart].groupColor, 0.6);
                    ctx.font = "600 9px 'JetBrains Mono',monospace";
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(currentGroup.toUpperCase(), 0, 0);
                    ctx.restore();

                    if (item.group !== currentGroup) {
                        currentGroup = item.group;
                        groupStart = i;
                    }
                }
            });

            // Draw bars
            bars.forEach(bar => {
                const isHov = hovered === bar;
                const alpha = hovered ? (isHov ? 0.95 : 0.3) : 0.8;

                ctx.beginPath();
                ctx.arc(CX, CY, innerR, bar.a0, bar.a1);
                ctx.arc(CX, CY, bar.r, bar.a1, bar.a0, true);
                ctx.closePath();

                const g = ctx.createRadialGradient(CX, CY, innerR, CX, CY, bar.r);
                g.addColorStop(0, hexRGBA(bar.color, alpha * 0.5));
                g.addColorStop(1, hexRGBA(bar.color, alpha));
                ctx.fillStyle = g;
                ctx.fill();

                if (isHov) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Label on bar
                const sweep = bar.a1 - bar.a0;
                const midA = (bar.a0 + bar.a1) / 2;
                const labelR = innerR + 20;
                if (sweep > 0.15) {
                    ctx.save();
                    ctx.translate(CX + Math.cos(midA) * labelR, CY + Math.sin(midA) * labelR);
                    let rot = midA + Math.PI / 2;
                    if (midA > 0 && midA < Math.PI) rot += Math.PI;
                    ctx.rotate(rot);
                    ctx.fillStyle = alpha > 0.5 ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.2)';
                    ctx.font = "500 8px 'Inter',sans-serif";
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const label = bar.name.length > 16 ? bar.name.slice(0, 14) + '…' : bar.name;
                    ctx.fillText(label, 0, 0);
                    ctx.restore();
                }

                // Value at end of bar
                const valR = bar.r + 12;
                ctx.fillStyle = alpha > 0.5 ? hexRGBA(bar.color, 0.9) : hexRGBA(bar.color, 0.2);
                ctx.font = "600 9px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(bar.val + 'h', CX + Math.cos(midA) * valR, CY + Math.sin(midA) * valR);
            });

            // Center
            ctx.fillStyle = '#0E1116';
            ctx.beginPath();
            ctx.arc(CX, CY, innerR - 2, 0, TAU);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = "600 22px 'Space Grotesk',sans-serif";
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('284h', CX, CY - 6);
            ctx.fillStyle = '#64748B';
            ctx.font = "500 9px 'JetBrains Mono',monospace";
            ctx.fillText('TOTAL LOSS', CX, CY + 12);
        }

        render();

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const dx = mx - CX, dy = my - CY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);

            hovered = null;
            if (dist >= innerR && dist <= maxR + 10) {
                for (const bar of bars) {
                    let a = angle;
                    if (a < bar.a0 - 0.1) a += TAU;
                    if (a >= bar.a0 && a <= bar.a1) { hovered = bar; break; }
                }
            }

            if (hovered) {
                tip.style.opacity = '1';
                tip.style.left = (e.clientX + 16) + 'px';
                tip.style.top = (e.clientY - 20) + 'px';
                tip.innerHTML = `<div style="font-weight:600;margin-bottom:4px">${hovered.name}</div><div style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#94A3B8">${hovered.val}h · ${hovered.group} · ${(hovered.val / 284 * 100).toFixed(1)}%</div>`;
                canvas.style.cursor = 'pointer';
            } else {
                tip.style.opacity = '0';
                canvas.style.cursor = 'default';
            }
            render();
        });

        canvas.addEventListener('mouseleave', () => { hovered = null; tip.style.opacity = '0'; render(); });
    </script>
</body>

</html>
