<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Loss Waterfall — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 28px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 600px;
            margin: 0 auto
        }

        canvas {
            display: block
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 7 · Waterfall</div>
        <h1>Peeling Away <span>the Layers</span></h1>
        <p>Starting from total loss, each bar subtracts and attributes a portion to a specific cause — until every hour
            has a name and the total reaches zero.</p>
    </div>
    <canvas id="chart"></canvas>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const W = 1100, H = 520;
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.scale(DPR, DPR);

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        const items = [
            { name: 'Total Loss', val: 284, color: '#94A3B8', isTotal: true, group: '' },
            { name: 'Planning\nEfficiency', val: -28, color: '#CA8A04', group: 'Avail · Planned' },
            { name: 'Operator\nDiscipline', val: -14, color: '#FBBF24', group: 'Avail · Planned' },
            { name: 'Op. Resolution\nTime', val: -58, color: '#FB923C', group: 'Avail · Unplanned' },
            { name: 'Op. Evaluation\nTime', val: -10, color: '#FB7185', group: 'Avail · Unplanned' },
            { name: 'Tech Response\nTime', val: -16, color: '#EF4444', group: 'Avail · Unplanned' },
            { name: 'Active\nWrench', val: -38, color: '#10B981', group: 'Avail · Unplanned' },
            { name: 'Inactive\nWrench', val: -22, color: '#EAB308', group: 'Avail · Unplanned' },
            { name: 'Interruptions', val: -24, color: '#60A5FA', group: 'Performance' },
            { name: 'True Speed', val: -48, color: '#6366F1', group: 'Performance' },
            { name: 'Startup\nRejects', val: -14, color: '#A855F7', group: 'Quality' },
            { name: 'In-Process\nRejects', val: -12, color: '#EC4899', group: 'Quality' },
            { name: 'Accounted', val: 0, color: '#10B981', isEnd: true, group: '' },
        ];

        const MARGIN = { top: 60, right: 30, bottom: 80, left: 60 };
        const chartW = W - MARGIN.left - MARGIN.right;
        const chartH = H - MARGIN.top - MARGIN.bottom;
        const barW = chartW / items.length;
        const maxVal = 300;
        const scale = chartH / maxVal;

        // Draw
        ctx.save();
        ctx.translate(MARGIN.left, MARGIN.top);

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,.04)';
        ctx.lineWidth = 1;
        for (let v = 0; v <= 300; v += 50) {
            const y = chartH - v * scale;
            ctx.beginPath();
            ctx.moveTo(0, y); ctx.lineTo(chartW, y);
            ctx.stroke();
            ctx.fillStyle = '#334155';
            ctx.font = "400 9px 'JetBrains Mono',monospace";
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText(v + 'h', -8, y);
        }

        let running = 0;

        items.forEach((item, i) => {
            const x = i * barW + barW * 0.15;
            const w = barW * 0.7;

            if (item.isTotal) {
                // Full bar from 0
                const barH = item.val * scale;
                const y = chartH - barH;
                const g = ctx.createLinearGradient(x, y, x, y + barH);
                g.addColorStop(0, hexRGBA(item.color, 0.9));
                g.addColorStop(1, hexRGBA(item.color, 0.5));
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.roundRect(x, y, w, barH, [4, 4, 0, 0]);
                ctx.fill();

                // Value label
                ctx.fillStyle = '#fff';
                ctx.font = "600 13px 'Space Grotesk',sans-serif";
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(item.val + 'h', x + w / 2, y - 6);

                running = item.val;
            } else if (item.isEnd) {
                // Zero bar — just a tick
                const y = chartH;
                ctx.fillStyle = hexRGBA(item.color, 0.8);
                ctx.fillRect(x, y - 3, w, 3);
                ctx.fillStyle = '#10B981';
                ctx.font = "600 12px 'Space Grotesk',sans-serif";
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText('0h ✓', x + w / 2, y - 8);
            } else {
                const absVal = Math.abs(item.val);
                const barH = absVal * scale;
                const newRunning = running + item.val;
                const y = chartH - running * scale;

                // Connector from previous
                ctx.strokeStyle = 'rgba(255,255,255,.06)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(x - barW * 0.15, chartH - running * scale);
                ctx.lineTo(x + w / 2, chartH - running * scale);
                ctx.stroke();
                ctx.setLineDash([]);

                // Bar (hanging from running total)
                const g = ctx.createLinearGradient(x, y - barH, x, y);
                g.addColorStop(0, hexRGBA(item.color, 0.5));
                g.addColorStop(1, hexRGBA(item.color, 0.9));
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.roundRect(x, y, w, -barH, [0, 0, 3, 3]);
                ctx.fill();

                // Value label
                ctx.fillStyle = hexRGBA(item.color, 1);
                ctx.font = "600 10px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillText('−' + absVal + 'h', x + w / 2, y + 4);

                // Running total
                ctx.fillStyle = '#334155';
                ctx.font = "400 8px 'JetBrains Mono',monospace";
                ctx.fillText((newRunning) + 'h left', x + w / 2, y + 18);

                running = newRunning;
            }

            // X-axis label
            const labelY = chartH + 12;
            ctx.fillStyle = '#94A3B8';
            ctx.font = "500 8.5px 'Inter',sans-serif";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            const lines = item.name.split('\n');
            lines.forEach((line, li) => {
                ctx.fillText(line, i * barW + barW / 2, labelY + li * 12);
            });

            // Group label
            if (item.group && (i === 0 || items[i - 1].group !== item.group)) {
                const groupItems = items.filter(it => it.group === item.group);
                const startIdx = items.indexOf(groupItems[0]);
                const endIdx = items.indexOf(groupItems[groupItems.length - 1]);
                const gx = startIdx * barW + barW * 0.1;
                const gw = (endIdx - startIdx + 1) * barW - barW * 0.2;
                const gy = chartH + 44;

                ctx.strokeStyle = 'rgba(255,255,255,.06)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(gx, gy); ctx.lineTo(gx + gw, gy);
                ctx.stroke();

                ctx.fillStyle = '#475569';
                ctx.font = "500 8px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center';
                ctx.fillText(item.group, gx + gw / 2, gy + 8);
            }
        });

        ctx.restore();
    </script>
</body>

</html>
