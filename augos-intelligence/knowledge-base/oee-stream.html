<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Loss Stream — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 24px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 600px;
            margin: 0 auto
        }

        canvas {
            display: block
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 8 · Vertical Stream</div>
        <h1>River Delta <span>of Loss</span></h1>
        <p>A single stream splits into tributaries as you move down. The width of each stream is proportional to time
            consumed. What starts as one river of loss becomes a delta of specific, actionable causes.</p>
    </div>
    <canvas id="chart"></canvas>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const W = 800, H = 900;
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.scale(DPR, DPR);

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        const TOTAL = 284;
        const CX = W / 2;

        // Each level defines where streams are at that Y position
        // { y, streams: [{ name, val, color, xCenter }] }

        const levels = [];
        const rowH = 140;
        const hGap = 6;

        // Level 0: Total (one wide stream)
        const totalW = 500;
        levels.push({
            y: 30,
            streams: [{ name: 'Total Loss', val: 284, color: '#94A3B8', x: CX - totalW / 2, w: totalW }]
        });

        // Level 1: A, P, Q
        function splitLevel(parentStreams, children, y) {
            const result = [];
            let parentIdx = 0;
            children.forEach(group => {
                const parent = parentStreams[group.parentIdx];
                const parentW = parent.w;
                const parentX = parent.x;
                const totalVal = group.items.reduce((s, c) => s + c.val, 0);
                let x = parentX;
                group.items.forEach(item => {
                    const w = (item.val / totalVal) * parentW;
                    result.push({ ...item, x, w: w - hGap });
                    x += w;
                });
            });
            return { y, streams: result };
        }

        // Level 1
        const avW = (186 / 284) * totalW;
        const pfW = (72 / 284) * totalW;
        const quW = (26 / 284) * totalW;
        const l1x = CX - totalW / 2;
        levels.push({
            y: 30 + rowH, streams: [
                { name: 'Availability', val: 186, color: '#F59E0B', x: l1x, w: avW - hGap },
                { name: 'Performance', val: 72, color: '#3B82F6', x: l1x + avW, w: pfW - hGap },
                { name: 'Quality', val: 26, color: '#8B5CF6', x: l1x + avW + pfW, w: quW - hGap },
            ]
        });

        // Level 2: Splits
        const l2y = 30 + rowH * 2;
        const avX = l1x;
        const plW = (42 / 186) * (avW - hGap);
        const unW = (144 / 186) * (avW - hGap);
        const intW = (24 / 72) * (pfW - hGap);
        const tsW = (48 / 72) * (pfW - hGap);
        const srW = (14 / 26) * (quW - hGap);
        const irW = (12 / 26) * (quW - hGap);
        const pfX = l1x + avW;
        const quX = l1x + avW + pfW;

        levels.push({
            y: l2y, streams: [
                { name: 'Planned', val: 42, color: '#D97706', x: avX, w: plW - hGap },
                { name: 'Unplanned', val: 144, color: '#F43F5E', x: avX + plW, w: unW - hGap },
                { name: 'Interruptions', val: 24, color: '#60A5FA', x: pfX, w: intW - hGap },
                { name: 'True Speed', val: 48, color: '#6366F1', x: pfX + intW, w: tsW - hGap },
                { name: 'Startup Rej.', val: 14, color: '#A855F7', x: quX, w: srW - hGap },
                { name: 'In-Process Rej.', val: 12, color: '#EC4899', x: quX + srW, w: irW - hGap },
            ]
        });

        // Level 3: Further splits
        const l3y = 30 + rowH * 3;
        const peW2 = (28 / 42) * (plW - hGap);
        const odW2 = (14 / 42) * (plW - hGap);
        const orW2 = (58 / 144) * (unW - hGap);
        const tiW2 = (86 / 144) * (unW - hGap);
        const unX = avX + plW;

        levels.push({
            y: l3y, streams: [
                { name: 'Plan. Efficiency', val: 28, color: '#CA8A04', x: avX, w: peW2 - hGap },
                { name: 'Op. Discipline', val: 14, color: '#FBBF24', x: avX + peW2, w: odW2 - hGap },
                { name: 'Op. Resolved', val: 58, color: '#FB923C', x: unX, w: orW2 - hGap },
                { name: 'Tech Interv.', val: 86, color: '#DC2626', x: unX + orW2, w: tiW2 - hGap },
                { name: 'Interruptions', val: 24, color: '#60A5FA', x: pfX, w: intW - hGap },
                { name: 'True Speed', val: 48, color: '#6366F1', x: pfX + intW, w: tsW - hGap },
                { name: 'Startup Rej.', val: 14, color: '#A855F7', x: quX, w: srW - hGap },
                { name: 'In-Process Rej.', val: 12, color: '#EC4899', x: quX + srW, w: irW - hGap },
            ]
        });

        // Level 4: Deepest
        const l4y = 30 + rowH * 4;
        const tiX = unX + orW2;
        const tiTW = tiW2 - hGap;
        const oeW = (10 / 86) * tiTW;
        const trW = (16 / 86) * tiTW;
        const awW = (38 / 86) * tiTW;
        const iwW = (22 / 86) * tiTW;

        levels.push({
            y: l4y, streams: [
                { name: 'Plan. Efficiency', val: 28, color: '#CA8A04', x: avX, w: peW2 - hGap },
                { name: 'Op. Discipline', val: 14, color: '#FBBF24', x: avX + peW2, w: odW2 - hGap },
                { name: 'Op. Resolution', val: 58, color: '#FB923C', x: unX, w: orW2 - hGap },
                { name: 'Op. Evaluation', val: 10, color: '#FB7185', x: tiX, w: oeW - hGap },
                { name: 'Tech Response', val: 16, color: '#EF4444', x: tiX + oeW, w: trW - hGap },
                { name: 'Active Wrench', val: 38, color: '#10B981', x: tiX + oeW + trW, w: awW - hGap },
                { name: 'Inactive Wrench', val: 22, color: '#EAB308', x: tiX + oeW + trW + awW, w: iwW - hGap },
                { name: 'Interruptions', val: 24, color: '#60A5FA', x: pfX, w: intW - hGap },
                { name: 'True Speed', val: 48, color: '#6366F1', x: pfX + intW, w: tsW - hGap },
                { name: 'Startup Rej.', val: 14, color: '#A855F7', x: quX, w: srW - hGap },
                { name: 'In-Process Rej.', val: 12, color: '#EC4899', x: quX + srW, w: irW - hGap },
            ]
        });

        // Draw flows between levels
        function drawStreamFlow(s0, s1, y0, y1, color) {
            const midY = (y0 + y1) / 2;
            ctx.beginPath();
            ctx.moveTo(s0.x, y0 + 24);
            ctx.bezierCurveTo(s0.x, midY, s1.x, midY, s1.x, y1);
            ctx.lineTo(s1.x + s1.w, y1);
            ctx.bezierCurveTo(s1.x + s1.w, midY, s0.x + s0.w, midY, s0.x + s0.w, y0 + 24);
            ctx.closePath();
            const g = ctx.createLinearGradient(0, y0, 0, y1);
            g.addColorStop(0, hexRGBA(color, 0.2));
            g.addColorStop(0.5, hexRGBA(color, 0.35));
            g.addColorStop(1, hexRGBA(color, 0.2));
            ctx.fillStyle = g;
            ctx.fill();
        }

        // Match streams between adjacent levels
        function findStreamByName(streams, name) {
            return streams.find(s => s.name === name);
        }

        // Draw connections
        for (let i = 0; i < levels.length - 1; i++) {
            const from = levels[i];
            const to = levels[i + 1];

            to.streams.forEach(ts => {
                // Find parent in 'from'
                let parent = findStreamByName(from.streams, ts.name);
                if (!parent) {
                    // Find by hierarchy
                    if (['Planned', 'Unplanned'].includes(ts.name)) parent = findStreamByName(from.streams, 'Availability');
                    else if (['Interruptions', 'True Speed'].includes(ts.name)) parent = findStreamByName(from.streams, 'Performance');
                    else if (['Startup Rej.', 'In-Process Rej.'].includes(ts.name)) parent = findStreamByName(from.streams, 'Quality');
                    else if (['Plan. Efficiency', 'Op. Discipline'].includes(ts.name)) parent = findStreamByName(from.streams, 'Planned');
                    else if (['Op. Resolved', 'Tech Interv.'].includes(ts.name)) parent = findStreamByName(from.streams, 'Unplanned');
                    else if (['Op. Evaluation', 'Tech Response', 'Active Wrench', 'Inactive Wrench'].includes(ts.name)) parent = findStreamByName(from.streams, 'Tech Interv.');
                    else if (ts.name === 'Op. Resolution') parent = findStreamByName(from.streams, 'Op. Resolved');
                    else if (['Availability', 'Performance', 'Quality'].includes(ts.name)) parent = findStreamByName(from.streams, 'Total Loss');
                }
                if (parent) {
                    drawStreamFlow(parent, ts, from.y, to.y, ts.color);
                }
            });
        }

        // Draw stream bars at each level
        levels.forEach((level, li) => {
            // Level label
            const labels = ['TOTAL LOSS', 'A · P · Q', 'CATEGORY', 'RESOLUTION', 'THE SCIENCE'];
            ctx.fillStyle = '#334155';
            ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText(labels[li] || '', l1x - 14, level.y + 12);

            level.streams.forEach(s => {
                // Bar
                const g = ctx.createLinearGradient(s.x, level.y, s.x + s.w, level.y);
                g.addColorStop(0, hexRGBA(s.color, 0.85));
                g.addColorStop(1, hexRGBA(s.color, 0.65));
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.roundRect(s.x, level.y, s.w, 24, 4);
                ctx.fill();

                // Label
                if (s.w > 50) {
                    ctx.fillStyle = 'rgba(255,255,255,.9)';
                    ctx.font = "600 9px 'Inter',sans-serif";
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const label = s.name.length > Math.floor(s.w / 6) ? s.name.slice(0, Math.floor(s.w / 6) - 1) + '…' : s.name;
                    ctx.fillText(label, s.x + s.w / 2, level.y + 8);
                    ctx.fillStyle = 'rgba(255,255,255,.5)';
                    ctx.font = "400 8px 'JetBrains Mono',monospace";
                    ctx.fillText(s.val + 'h', s.x + s.w / 2, level.y + 18);
                } else if (s.w > 20) {
                    ctx.fillStyle = 'rgba(255,255,255,.7)';
                    ctx.font = "500 8px 'JetBrains Mono',monospace";
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(s.val + 'h', s.x + s.w / 2, level.y + 12);
                }
            });
        });
    </script>
</body>

</html>
