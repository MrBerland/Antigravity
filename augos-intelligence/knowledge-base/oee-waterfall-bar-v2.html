<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Waterfall + Bar V2 — Gradient Shading — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 28px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 640px;
            margin: 0 auto;
            line-height: 1.6
        }

        canvas {
            display: block
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">V2 · Gradient Shading Zones</div>
        <h1>Tracing Every Hour <span>to Its Source</span></h1>
        <p>Gradient columns cascade from each category — dark at the source, fading to transparent — visually anchoring
            every waterfall variable to its origin without explicit connectors.</p>
    </div>
    <canvas id="chart"></canvas>
    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const W = 1100, H = 740;
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.scale(DPR, DPR);
        function hexRGBA(h, a) { return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`; }

        const TOTAL = 284, ML = 60, MR = 30, MT = 0, MB = 80;
        const chartL = ML, chartR = W - MR, chartW = chartR - chartL;
        const BAR_H = 48, GAP = 50;
        const categories = [
            {
                name: 'Planned', val: 42, color: '#D97706', items: [
                    { name: 'Plan.\nEfficiency', val: 28, color: '#CA8A04' },
                    { name: 'Op.\nDiscipline', val: 14, color: '#FBBF24' },
                ]
            },
            {
                name: 'Unplanned', val: 144, color: '#F43F5E', items: [
                    { name: 'Op. Resol.\nTime', val: 58, color: '#FB923C' },
                    { name: 'Op. Eval.\nTime', val: 10, color: '#FB7185' },
                    { name: 'Tech Resp.\nTime', val: 16, color: '#EF4444' },
                    { name: 'Active\nWrench', val: 38, color: '#10B981' },
                    { name: 'Inactive\nWrench', val: 22, color: '#EAB308' },
                ]
            },
            {
                name: 'Performance', val: 72, color: '#3B82F6', items: [
                    { name: 'Inter-\nruptions', val: 24, color: '#60A5FA' },
                    { name: 'True\nSpeed', val: 48, color: '#6366F1' },
                ]
            },
            {
                name: 'Quality', val: 26, color: '#8B5CF6', items: [
                    { name: 'Startup\nRejects', val: 14, color: '#A855F7' },
                    { name: 'In-Proc.\nRejects', val: 12, color: '#EC4899' },
                ]
            },
        ];

        // Full-width child-up layout
        const N = 11, catGap = 14, itemGap = 4;
        const nCG = categories.length - 1;
        const nIG = categories.reduce((s, c) => s + Math.max(0, c.items.length - 1), 0);
        const wfBarW = (chartW - nCG * catGap - nIG * itemGap) / N;
        const wfPositions = []; let cx = chartL; const catSpans = [];
        categories.forEach((cat, ci) => {
            const cl = cx;
            cat.items.forEach((_, ii) => { wfPositions.push({ x: cx, w: wfBarW }); cx += wfBarW; if (ii < cat.items.length - 1) cx += itemGap; });
            const cr = cx; catSpans.push({ left: cl, right: cr, w: cr - cl, cx: (cl + cr) / 2 });
            if (ci < categories.length - 1) cx += catGap;
        });
        const barY = MT + 10, wfTop = barY + BAR_H + GAP + 20;
        const wfH = H - wfTop - MB, wfScale = wfH / 300;

        // ─── GRADIENT SHADING — aligned exactly to catSpans ─────────────────────
        categories.forEach((cat, ci) => {
            const sp = catSpans[ci];
            const st = barY + BAR_H; const sb = wfTop + wfH + 20;
            // Use exact span boundaries — no padding offset
            const g = ctx.createLinearGradient(0, st, 0, sb);
            g.addColorStop(0, hexRGBA(cat.color, 0.09));
            g.addColorStop(0.2, hexRGBA(cat.color, 0.045));
            g.addColorStop(0.5, hexRGBA(cat.color, 0.015));
            g.addColorStop(1, hexRGBA(cat.color, 0.0));
            ctx.fillStyle = g;
            ctx.fillRect(sp.left, st, sp.w, sb - st);
            // Aligned edge lines
            ctx.strokeStyle = hexRGBA(cat.color, 0.05); ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
            ctx.beginPath();
            ctx.moveTo(sp.left, st + 10); ctx.lineTo(sp.left, sb - 20);
            ctx.moveTo(sp.right, st + 10); ctx.lineTo(sp.right, sb - 20);
            ctx.stroke(); ctx.setLineDash([]);
        });

        // Top bar
        ctx.fillStyle = '#334155'; ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.fillText('STANDARD OEE CATEGORIES', chartL, barY - 6);
        ctx.textAlign = 'right'; ctx.fillText(TOTAL + 'H TOTAL LOSS', chartR, barY - 6);
        categories.forEach((cat, ci) => {
            const sp = catSpans[ci];
            const g = ctx.createLinearGradient(sp.left, barY, sp.left, barY + BAR_H);
            g.addColorStop(0, hexRGBA(cat.color, 0.85)); g.addColorStop(1, hexRGBA(cat.color, 0.65));
            ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(sp.left, barY, sp.w, BAR_H, 6); ctx.fill();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,.95)'; ctx.font = "600 11px 'Inter',sans-serif";
            ctx.fillText(cat.name, sp.cx, barY + BAR_H / 2 - 8);
            ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.font = "400 10px 'JetBrains Mono',monospace";
            ctx.fillText(cat.val + 'h · ' + (cat.val / TOTAL * 100).toFixed(0) + '%', sp.cx, barY + BAR_H / 2 + 8);
        });

        ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('▼  DECOMPOSED INTO 11 VARIABLES  ▼', chartL + chartW / 2, barY + BAR_H + GAP / 2);
        ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
        for (let v = 0; v <= 300; v += 50) {
            const y = wfTop + wfH - v * wfScale;
            ctx.beginPath(); ctx.moveTo(chartL, y); ctx.lineTo(chartR, y); ctx.stroke();
            ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(v + 'h', chartL - 8, y);
        }

        // Waterfall bars
        let running = TOTAL; let gi = 0;
        categories.forEach(cat => {
            cat.items.forEach(item => {
                const pos = wfPositions[gi]; const x = pos.x;
                const barH = item.val * wfScale; const topY = wfTop + wfH - running * wfScale; const bottomY = topY + barH;
                if (gi > 0) {
                    ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                    ctx.beginPath(); ctx.moveTo(wfPositions[gi - 1].x + wfBarW, topY); ctx.lineTo(x, topY); ctx.stroke(); ctx.setLineDash([]);
                }
                ctx.shadowColor = hexRGBA(item.color, 0.12); ctx.shadowBlur = 8;
                const g = ctx.createLinearGradient(x, topY, x, bottomY);
                g.addColorStop(0, hexRGBA(item.color, 0.5)); g.addColorStop(1, hexRGBA(item.color, 0.9));
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(x, topY, wfBarW, barH, 3); ctx.fill();
                ctx.shadowBlur = 0; ctx.strokeStyle = hexRGBA(item.color, 0.2); ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = hexRGBA(item.color, 1); ctx.font = "600 9px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText('−' + item.val + 'h', x + wfBarW / 2, bottomY + 3);
                running -= item.val;
                ctx.fillStyle = '#334155'; ctx.font = "400 7px 'JetBrains Mono',monospace"; ctx.fillText(running + 'h', x + wfBarW / 2, bottomY + 15);
                ctx.fillStyle = '#94A3B8'; ctx.font = "500 7.5px 'Inter',sans-serif"; ctx.textBaseline = 'top';
                const lY = wfTop + wfH + 10; item.name.split('\n').forEach((l, li) => ctx.fillText(l, x + wfBarW / 2, lY + li * 10));
                gi++;
            });
        });

        const glY = wfTop + wfH + 40;
        categories.forEach((cat, ci) => {
            const sp = catSpans[ci]; ctx.strokeStyle = hexRGBA(cat.color, 0.25); ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(sp.left, glY); ctx.lineTo(sp.right, glY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sp.left, glY - 3); ctx.lineTo(sp.left, glY + 3); ctx.moveTo(sp.right, glY - 3); ctx.lineTo(sp.right, glY + 3); ctx.stroke();
            ctx.fillStyle = hexRGBA(cat.color, 0.5); ctx.font = "500 7.5px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText(cat.name + ' · ' + cat.val + 'h', sp.cx, glY + 5);
        });
    </script>
</body>

</html>
