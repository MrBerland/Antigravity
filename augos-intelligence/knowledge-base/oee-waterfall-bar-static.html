<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Waterfall + Bar — Static — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 28px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 640px;
            margin: 0 auto;
            line-height: 1.6
        }

        canvas {
            display: block
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Static · Waterfall + Source Bar</div>
        <h1>Where It Comes From <span>· Where It Goes</span></h1>
        <p>The horizontal bar at top shows the four standard OEE categories. The waterfall below decomposes every hour —
            each bar subtracts from the running total until all 284 hours are fully accounted for.</p>
    </div>
    <canvas id="chart"></canvas>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const W = 1100, H = 720;
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.scale(DPR, DPR);

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        const TOTAL = 284;
        const MARGIN = { top: 0, right: 30, bottom: 80, left: 60 };
        const BAR_H = 52; // Height of top bar
        const GAP = 40;   // Gap between bar and waterfall
        const chartLeft = MARGIN.left;
        const chartRight = W - MARGIN.right;
        const chartW = chartRight - chartLeft;

        // ─── TOP BAR ────────────────────────────────────────────────────────────
        const categories = [
            { name: 'Planned', val: 42, color: '#D97706' },
            { name: 'Unplanned', val: 144, color: '#F43F5E' },
            { name: 'Performance', val: 72, color: '#3B82F6' },
            { name: 'Quality', val: 26, color: '#8B5CF6' },
        ];

        const barY = MARGIN.top + 10;
        let bx = chartLeft;

        // Bar background
        ctx.fillStyle = 'rgba(255,255,255,.02)';
        ctx.beginPath();
        ctx.roundRect(chartLeft, barY, chartW, BAR_H, 8);
        ctx.fill();

        categories.forEach(cat => {
            const w = (cat.val / TOTAL) * chartW;

            // Segment
            const g = ctx.createLinearGradient(bx, barY, bx, barY + BAR_H);
            g.addColorStop(0, hexRGBA(cat.color, 0.85));
            g.addColorStop(1, hexRGBA(cat.color, 0.65));
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.roundRect(bx + 1, barY + 1, w - 2, BAR_H - 2, 6);
            ctx.fill();

            // Label
            if (w > 55) {
                ctx.fillStyle = 'rgba(255,255,255,.95)';
                ctx.font = "600 11px 'Inter',sans-serif";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(cat.name, bx + w / 2, barY + BAR_H / 2 - 8);
                ctx.fillStyle = 'rgba(255,255,255,.5)';
                ctx.font = "400 10px 'JetBrains Mono',monospace";
                ctx.fillText(cat.val + 'h · ' + (cat.val / TOTAL * 100).toFixed(0) + '%', bx + w / 2, barY + BAR_H / 2 + 8);
            } else {
                ctx.fillStyle = 'rgba(255,255,255,.7)';
                ctx.font = "500 9px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(cat.val + 'h', bx + w / 2, barY + BAR_H / 2);
            }

            bx += w;
        });

        // Category labels above
        ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#334155';
        ctx.fillText('STANDARD OEE CATEGORIES', chartLeft, barY - 6);
        ctx.textAlign = 'right';
        ctx.fillText(TOTAL + 'H TOTAL LOSS', chartRight, barY - 6);

        // ─── CONNECTOR LINES from bar to waterfall ──────────────────────────────
        const waterfallTop = barY + BAR_H + GAP + 20;
        const waterfallH = H - waterfallTop - MARGIN.bottom;
        const maxWfVal = 300;
        const wfScale = waterfallH / maxWfVal;

        // waterfall items
        const items = [
            { name: 'Plan.\nEfficiency', val: 28, color: '#CA8A04', parent: 'Planned' },
            { name: 'Op.\nDiscipline', val: 14, color: '#FBBF24', parent: 'Planned' },
            { name: 'Op. Resol.\nTime', val: 58, color: '#FB923C', parent: 'Unplanned' },
            { name: 'Op. Eval.\nTime', val: 10, color: '#FB7185', parent: 'Unplanned' },
            { name: 'Tech Resp.\nTime', val: 16, color: '#EF4444', parent: 'Unplanned' },
            { name: 'Active\nWrench', val: 38, color: '#10B981', parent: 'Unplanned' },
            { name: 'Inactive\nWrench', val: 22, color: '#EAB308', parent: 'Unplanned' },
            { name: 'Inter-\nruptions', val: 24, color: '#60A5FA', parent: 'Performance' },
            { name: 'True\nSpeed', val: 48, color: '#6366F1', parent: 'Performance' },
            { name: 'Startup\nRejects', val: 14, color: '#A855F7', parent: 'Quality' },
            { name: 'In-Proc.\nRejects', val: 12, color: '#EC4899', parent: 'Quality' },
        ];

        const nBars = items.length + 1; // +1 for "accounted" at end
        const barSpacing = chartW / (nBars + 1);

        // Label between sections
        ctx.font = "500 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#334155';
        ctx.fillText('AUGOS ENHANCED DECOMPOSITION', chartLeft, waterfallTop - 8);

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,.03)';
        ctx.lineWidth = 1;
        for (let v = 0; v <= 300; v += 50) {
            const y = waterfallTop + waterfallH - v * wfScale;
            ctx.beginPath();
            ctx.moveTo(chartLeft, y); ctx.lineTo(chartRight, y);
            ctx.stroke();
            ctx.fillStyle = '#1E293B';
            ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText(v + 'h', chartLeft - 8, y);
        }

        // Draw connector lines from bar categories down to their waterfall children
        const parentColors = { 'Planned': '#D97706', 'Unplanned': '#F43F5E', 'Performance': '#3B82F6', 'Quality': '#8B5CF6' };

        // Calculate bar x positions from top bar
        function getBarCatRange(catName) {
            let x = chartLeft;
            for (const cat of categories) {
                const w = (cat.val / TOTAL) * chartW;
                if (cat.name === catName) return { x, w, cx: x + w / 2 };
                x += w;
            }
            return { x: 0, w: 0, cx: 0 };
        }

        // Draw waterfall
        let running = TOTAL;
        const wfBarW = barSpacing * 0.65;

        // First bar: Total (starting point reference line)
        const totalBarX = chartLeft + barSpacing * 0.5;
        const totalBarH = TOTAL * wfScale;
        const totalBarY = waterfallTop + waterfallH - totalBarH;

        // Dashed reference line from total
        ctx.strokeStyle = 'rgba(148,163,184,.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(totalBarX + wfBarW, totalBarY);
        ctx.lineTo(chartRight, totalBarY);
        ctx.stroke();
        ctx.setLineDash([]);

        // Total bar
        const gTotal = ctx.createLinearGradient(totalBarX, totalBarY, totalBarX, totalBarY + totalBarH);
        gTotal.addColorStop(0, 'rgba(148,163,184,0.7)');
        gTotal.addColorStop(1, 'rgba(148,163,184,0.4)');
        ctx.fillStyle = gTotal;
        ctx.beginPath();
        ctx.roundRect(totalBarX, totalBarY, wfBarW, totalBarH, [4, 4, 0, 0]);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.font = "600 13px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(TOTAL + 'h', totalBarX + wfBarW / 2, totalBarY - 6);

        // X label
        ctx.fillStyle = '#94A3B8';
        ctx.font = "500 8px 'Inter',sans-serif";
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Total', totalBarX + wfBarW / 2, waterfallTop + waterfallH + 10);
        ctx.fillText('Loss', totalBarX + wfBarW / 2, waterfallTop + waterfallH + 22);

        // Draw each waterfall bar with connector from source category
        items.forEach((item, i) => {
            const x = totalBarX + barSpacing * (i + 1);
            const barH = item.val * wfScale;
            const topY = waterfallTop + waterfallH - running * wfScale;
            const bottomY = topY + barH;

            // Connector line from previous running total
            ctx.strokeStyle = 'rgba(255,255,255,.04)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(x - barSpacing * 0.35, topY);
            ctx.lineTo(x + wfBarW / 2, topY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Connector from source bar (top) down to this waterfall bar
            const catRange = getBarCatRange(item.parent);
            const connectorTopY = barY + BAR_H;
            const connectorBottom = topY;

            // Subtle vertical connection line
            ctx.strokeStyle = hexRGBA(parentColors[item.parent], 0.08);
            ctx.lineWidth = Math.max(1, (item.val / TOTAL) * 20);
            ctx.beginPath();
            const connX = x + wfBarW / 2;
            ctx.moveTo(connX, connectorTopY + 4);
            ctx.bezierCurveTo(connX, connectorTopY + GAP * 0.4, connX, connectorBottom - GAP * 0.3, connX, connectorBottom);
            ctx.stroke();

            // Waterfall bar
            const g = ctx.createLinearGradient(x, topY, x, bottomY);
            g.addColorStop(0, hexRGBA(item.color, 0.5));
            g.addColorStop(1, hexRGBA(item.color, 0.9));
            ctx.fillStyle = g;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, topY, wfBarW, barH, 3);
            ctx.fill();

            // Subtle border
            ctx.strokeStyle = hexRGBA(item.color, 0.2);
            ctx.lineWidth = 1;
            ctx.stroke();

            // Value label
            ctx.fillStyle = hexRGBA(item.color, 1);
            ctx.font = "600 9px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText('−' + item.val + 'h', x + wfBarW / 2, bottomY + 3);

            // Running total
            running -= item.val;
            ctx.fillStyle = '#334155';
            ctx.font = "400 7px 'JetBrains Mono',monospace";
            ctx.fillText(running + 'h', x + wfBarW / 2, bottomY + 15);

            // X-axis label
            const labelY = waterfallTop + waterfallH + 10;
            ctx.fillStyle = '#94A3B8';
            ctx.font = "500 7.5px 'Inter',sans-serif";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            const lines = item.name.split('\n');
            lines.forEach((line, li) => ctx.fillText(line, x + wfBarW / 2, labelY + li * 10));
        });

        // Final "accounted" marker
        const accX = totalBarX + barSpacing * (items.length + 1);
        const accY = waterfallTop + waterfallH;
        ctx.fillStyle = hexRGBA('#10B981', 0.8);
        ctx.fillRect(accX, accY - 3, wfBarW, 3);
        ctx.fillStyle = '#10B981';
        ctx.font = "600 11px 'Space Grotesk',sans-serif";
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText('0h ✓', accX + wfBarW / 2, accY - 8);
        ctx.fillStyle = '#94A3B8';
        ctx.font = "500 7.5px 'Inter',sans-serif";
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Fully', accX + wfBarW / 2, waterfallTop + waterfallH + 10);
        ctx.fillText('Accounted', accX + wfBarW / 2, waterfallTop + waterfallH + 22);

        // ─── PARENT GROUP SPANS ─────────────────────────────────────────────────
        const groupSpans = [
            { name: 'Planned', start: 0, end: 1, color: '#D97706' },
            { name: 'Unplanned', start: 2, end: 6, color: '#F43F5E' },
            { name: 'Performance', start: 7, end: 8, color: '#3B82F6' },
            { name: 'Quality', start: 9, end: 10, color: '#8B5CF6' },
        ];

        const groupLabelY = waterfallTop + waterfallH + 44;
        groupSpans.forEach(gs => {
            const startX = totalBarX + barSpacing * (gs.start + 1);
            const endX = totalBarX + barSpacing * (gs.end + 1) + wfBarW;
            const midX = (startX + endX) / 2;

            // Line
            ctx.strokeStyle = hexRGBA(gs.color, 0.2);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(startX, groupLabelY);
            ctx.lineTo(endX, groupLabelY);
            ctx.stroke();

            // Tick marks
            ctx.beginPath();
            ctx.moveTo(startX, groupLabelY - 3);
            ctx.lineTo(startX, groupLabelY + 3);
            ctx.moveTo(endX, groupLabelY - 3);
            ctx.lineTo(endX, groupLabelY + 3);
            ctx.stroke();

            // Label
            ctx.fillStyle = hexRGBA(gs.color, 0.5);
            ctx.font = "500 7.5px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText(gs.name, midX, groupLabelY + 5);
        });

        // Arrow from bar to waterfall
        const arrowY = barY + BAR_H + GAP / 2;
        ctx.fillStyle = '#1E293B';
        ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('▼  DECOMPOSED INTO 11 VARIABLES  ▼', chartLeft + chartW / 2, arrowY);
    </script>
</body>

</html>
