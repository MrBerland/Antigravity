<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Anatomy of 284 Lost Hours — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif
        }

        .scroll-space {
            height: 500vh
        }

        .fixed-viewport {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center
        }

        canvas {
            display: block
        }

        /* Progress */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            z-index: 100
        }

        .scroll-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #D97706, #F43F5E, #3B82F6, #8B5CF6);
            transition: width .05s linear
        }

        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #334155;
            letter-spacing: .06em;
            animation: hintPulse 2s ease infinite
        }

        @keyframes hintPulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .7
            }
        }
    </style>
</head>

<body>
    <div class="scroll-space"></div>
    <div class="fixed-viewport"><canvas id="chart"></canvas></div>
    <div class="scroll-progress">
        <div class="scroll-progress-fill" id="progressFill"></div>
    </div>
    <div class="scroll-hint" id="scrollHint">SCROLL TO EXPLORE ↓</div>
    <script>
        const C = document.getElementById('chart'), ctx = C.getContext('2d');
        const DPR = devicePixelRatio || 1, W = 1200, H = 750;
        C.width = W * DPR; C.height = H * DPR; C.style.width = W + 'px'; C.style.height = H + 'px';
        ctx.scale(DPR, DPR);

        const hex = (h, a) => `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        const lerp = (a, b, t) => a + (b - a) * t;
        const easeOut = t => 1 - Math.pow(1 - t, 3);
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        const TOTAL = 284, ML = 70, MR = 40, MB = 90;
        const chartL = ML, chartR = W - MR, chartW = chartR - chartL;
        const BAR_H = 48, GAP = 55;

        const categories = [
            {
                name: 'Planned', val: 42, color: '#D97706', narrative: 'Planned downtime that exceeded its allocation — scheduling inefficiency and operator discipline gaps.', items: [
                    { name: 'Planning\nEfficiency', val: 28, color: '#CA8A04', story: '28 hours lost to scheduling inefficiency' },
                    { name: 'Operator\nDiscipline', val: 14, color: '#FBBF24', story: '14 hours from late starts, early stops, extended breaks' },
                ]
            },
            {
                name: 'Unplanned', val: 144, color: '#F43F5E', narrative: 'The biggest category. 144 hours of unplanned stoppages — over half of all losses. This is where intelligence matters most.', items: [
                    { name: 'Op. Resolution\nTime', val: 58, color: '#FB923C', story: '58 hours — operators resolving issues without technical support' },
                    { name: 'Op. Evaluation\nTime', val: 10, color: '#FB7185', story: '10 hours diagnosing failures before calling for help' },
                    { name: 'Tech Response\nTime', val: 16, color: '#EF4444', story: '16 hours waiting for technicians to arrive' },
                    { name: 'Active\nWrench', val: 38, color: '#10B981', story: '38 hours of productive repair — the only "good" unplanned time' },
                    { name: 'Inactive\nWrench', val: 22, color: '#EAB308', story: '22 hours of wrench time wasted on waiting, searching, walking' },
                ]
            },
            {
                name: 'Performance', val: 72, color: '#3B82F6', narrative: 'The machine was running — but not at full speed. 72 hours of hidden loss.', items: [
                    { name: 'Micro\nInterruptions', val: 24, color: '#60A5FA', story: '24 hours of micro-stops too brief to log but devastating in aggregate' },
                    { name: 'True Speed\nLoss', val: 48, color: '#6366F1', story: '48 hours running below design speed — the silent killer' },
                ]
            },
            {
                name: 'Quality', val: 26, color: '#8B5CF6', narrative: '26 hours producing product that never shipped. Material, energy, and time — wasted.', items: [
                    { name: 'Startup\nRejects', val: 14, color: '#A855F7', story: '14 hours of reject production during startup' },
                    { name: 'In-Process\nRejects', val: 12, color: '#EC4899', story: '12 hours of steady-state defects' },
                ]
            },
        ];

        // Full-width child-up layout
        const N = 11, catGap = 14, itemGap = 4;
        const nCG = categories.length - 1, nIG = categories.reduce((s, c) => s + Math.max(0, c.items.length - 1), 0);
        const wfBarW = (chartW - nCG * catGap - nIG * itemGap) / N;
        const wfPositions = []; let cx = chartL; const catSpans = [];
        categories.forEach((cat, ci) => {
            const cl = cx;
            cat.items.forEach((_, ii) => { wfPositions.push({ x: cx, w: wfBarW }); cx += wfBarW; if (ii < cat.items.length - 1) cx += itemGap; });
            const cr = cx; catSpans.push({ left: cl, right: cr, w: cr - cl, cx: (cl + cr) / 2 });
            if (ci < categories.length - 1) cx += catGap;
        });

        const barY = 10, wfTop = barY + BAR_H + GAP + 20, wfH = H - wfTop - MB, wfScale = wfH / 300;
        const allItems = []; let running = TOTAL;
        categories.forEach((cat, ci) => {
            cat.items.forEach(item => {
                const gi = allItems.length, pos = wfPositions[gi], bH = item.val * wfScale;
                const topY = wfTop + wfH - running * wfScale;
                allItems.push({
                    ...item, parentColor: cat.color, parentName: cat.name, parentNarrative: cat.narrative,
                    x: pos.x, barH: bH, topY, bottomY: topY + bH, runAfter: running - item.val, catSpan: catSpans[ci], gi
                });
                running -= item.val;
            });
        });

        // Scroll → 11 bar reveals + intro + outro = 13 "beats"
        // Beat 0: intro. Beats 1-11: bar reveals. Beat 12: summary.
        const BEATS = 13;
        function getProgress() {
            const s = window.scrollY, max = document.documentElement.scrollHeight - window.innerHeight;
            return clamp(s / max, 0, 1);
        }

        function draw() {
            const p = getProgress();
            document.getElementById('progressFill').style.width = (p * 100) + '%';
            document.getElementById('scrollHint').style.opacity = p < 0.05 ? 1 : 0;

            ctx.clearRect(0, 0, W, H);

            const beat = p * BEATS;
            const introP = clamp(beat, 0, 1); // beat 0→1: intro
            const summaryP = clamp(beat - BEATS + 1, 0, 1); // last beat: summary

            // ─── INTRO ──────────────────────────────────────────────────────────
            if (introP < 1) {
                const t = easeOut(introP);
                ctx.globalAlpha = 1 - t * 0.3;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                // Big number
                const countTo = Math.round(t * 284);
                ctx.fillStyle = '#E2E8F0';
                ctx.font = `700 ${lerp(90, 50, t)}px 'Space Grotesk',sans-serif`;
                ctx.fillText(countTo, W / 2, lerp(H / 2 - 20, H / 2 - 60, t));
                ctx.fillStyle = '#64748B';
                ctx.font = "400 14px 'Inter',sans-serif";
                ctx.fillText('hours of production lost', W / 2, lerp(H / 2 + 30, H / 2 - 20, t));
                ctx.font = "300 11px 'Inter',sans-serif";
                ctx.fillStyle = '#475569';
                ctx.fillText('But where exactly? Scroll to decompose every hour.', W / 2, lerp(H / 2 + 55, H / 2 + 0, t));
                ctx.globalAlpha = 1;
            }

            // ─── CHART ELEMENTS (fade in after intro) ───────────────────────────
            const chartAlpha = clamp((beat - 0.6) / 0.4, 0, 1);
            if (chartAlpha <= 0) { requestAnimationFrame(draw); return; }
            ctx.globalAlpha = chartAlpha;

            // Top bar header
            ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.fillText('STANDARD OEE CATEGORIES', chartL, barY - 6);
            ctx.textAlign = 'right'; ctx.fillText(TOTAL + 'H TOTAL LOSS', chartR, barY - 6);

            // Top bar segments — highlight active category
            const activeBeat = Math.floor(beat - 1); // which bar is currently revealing (0-indexed)
            const activeItem = activeBeat >= 0 && activeBeat < N ? allItems[activeBeat] : null;

            categories.forEach((cat, ci) => {
                const sp = catSpans[ci];
                const isActive = activeItem && activeItem.parentName === cat.name;
                const isDone = activeBeat >= 0 && allItems.findIndex(it => it.parentName === cat.name) <= activeBeat;

                const baseAlpha = isActive ? 0.9 : (isDone ? 0.7 : 0.35);
                const g = ctx.createLinearGradient(sp.left, barY, sp.left, barY + BAR_H);
                g.addColorStop(0, hex(cat.color, baseAlpha));
                g.addColorStop(1, hex(cat.color, baseAlpha * 0.75));
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(sp.left, barY, sp.w, BAR_H, 6); ctx.fill();

                if (isActive) {
                    ctx.shadowColor = hex(cat.color, .25); ctx.shadowBlur = 16;
                    ctx.strokeStyle = hex(cat.color, .4); ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.roundRect(sp.left, barY, sp.w, BAR_H, 6); ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = `rgba(255,255,255,${isActive ? 0.95 : isDone ? 0.7 : 0.3})`;
                ctx.font = "600 11px 'Inter',sans-serif";
                ctx.fillText(cat.name, sp.cx, barY + BAR_H / 2 - 8);
                ctx.fillStyle = `rgba(255,255,255,${isActive ? 0.5 : isDone ? 0.35 : 0.15})`;
                ctx.font = "400 10px 'JetBrains Mono',monospace";
                ctx.fillText(cat.val + 'h · ' + (cat.val / TOTAL * 100).toFixed(0) + '%', sp.cx, barY + BAR_H / 2 + 8);
            });

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
            for (let v = 0; v <= 300; v += 50) {
                const y = wfTop + wfH - v * wfScale;
                ctx.beginPath(); ctx.moveTo(chartL, y); ctx.lineTo(chartR, y); ctx.stroke();
                ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(v + 'h', chartL - 8, y);
            }

            // ─── WATERFALL BARS (scroll-revealed) ───────────────────────────────
            for (let i = 0; i < N; i++) {
                const barBeat = i + 1; // beat 1-11
                const barP = clamp((beat - barBeat) / 0.8, 0, 1); // 0→1 over 0.8 of a beat
                if (barP <= 0) continue;

                const item = allItems[i];
                const t = easeOut(barP);

                // Gradient shading zone (subtle)
                if (t > 0.1) {
                    const shadeAlpha = t * 0.04;
                    ctx.fillStyle = hex(item.parentColor, shadeAlpha);
                    ctx.fillRect(item.x, barY + BAR_H, wfBarW, item.topY - barY - BAR_H);
                }

                // Dashed running-total connector
                if (i > 0 && t > 0.3) {
                    const prev = allItems[i - 1];
                    ctx.strokeStyle = `rgba(255,255,255,${(t - 0.3) / 0.7 * 0.06})`;
                    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                    ctx.beginPath(); ctx.moveTo(prev.x + wfBarW, item.topY); ctx.lineTo(item.x, item.topY);
                    ctx.stroke(); ctx.setLineDash([]);
                }

                // Bar grows downward from topY
                const barH = item.barH * t;
                ctx.shadowColor = hex(item.color, .15 * t); ctx.shadowBlur = 8 * t;
                const g = ctx.createLinearGradient(item.x, item.topY, item.x, item.topY + item.barH);
                g.addColorStop(0, hex(item.color, .5)); g.addColorStop(1, hex(item.color, .9));
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(item.x, item.topY, wfBarW, barH, 3); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = hex(item.color, .2 * t); ctx.lineWidth = 1; ctx.stroke();

                // Value labels
                if (t > 0.5) {
                    const la = (t - 0.5) / 0.5;
                    ctx.fillStyle = hex(item.color, la);
                    ctx.font = "600 9px 'JetBrains Mono',monospace";
                    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                    ctx.fillText('−' + item.val + 'h', item.x + wfBarW / 2, item.bottomY + 3);
                    ctx.fillStyle = `rgba(51,65,85,${la})`;
                    ctx.font = "400 7px 'JetBrains Mono',monospace";
                    ctx.fillText(item.runAfter + 'h', item.x + wfBarW / 2, item.bottomY + 15);
                }

                // X-axis label
                ctx.fillStyle = `rgba(148,163,184,${t * 0.8})`;
                ctx.font = "500 7.5px 'Inter',sans-serif"; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                const lY = wfTop + wfH + 10;
                item.name.split('\n').forEach((l, li) => ctx.fillText(l, item.x + wfBarW / 2, lY + li * 10));

                // Story callout for the ACTIVE bar (the one currently revealing)
                const isRevealing = beat >= barBeat && beat < barBeat + 1;
                if (isRevealing && t > 0.2) {
                    const storyAlpha = Math.min((t - 0.2) / 0.3, 1) * 0.85;
                    // Draw story text next to the bar
                    const storyX = item.x + wfBarW + 14;
                    const storyY = item.topY + item.barH / 2;

                    if (storyX + 200 < W - 20) {
                        ctx.fillStyle = `rgba(226,232,240,${storyAlpha})`;
                        ctx.font = "500 10px 'Inter',sans-serif";
                        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                        // Only show if there's room
                        const maxW = chartR - storyX - 10;
                        if (maxW > 80) ctx.fillText(item.story, storyX, storyY, maxW);
                    }
                }
            }

            // Category span markers
            categories.forEach((cat, ci) => {
                const sp = catSpans[ci];
                const lastIdx = allItems.length - 1 - [...allItems].reverse().findIndex(it => it.parentName === cat.name);
                const allDone = activeBeat >= lastIdx;
                if (!allDone) return;

                const glY = wfTop + wfH + 40;
                ctx.strokeStyle = hex(cat.color, .25); ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(sp.left, glY); ctx.lineTo(sp.right, glY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sp.left, glY - 3); ctx.lineTo(sp.left, glY + 3);
                ctx.moveTo(sp.right, glY - 3); ctx.lineTo(sp.right, glY + 3); ctx.stroke();
                ctx.fillStyle = hex(cat.color, .5); ctx.font = "500 7.5px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText(cat.name + ' · ' + cat.val + 'h', sp.cx, glY + 5);
            });

            // Category narrative (appears when category first becomes active)
            if (activeItem && beat > 1) {
                const catFirst = allItems.findIndex(it => it.parentName === activeItem.parentName);
                const catBeat = catFirst + 1;
                const narAlpha = clamp((beat - catBeat) / 0.5, 0, 1) * 0.6;
                ctx.fillStyle = `rgba(100,116,139,${narAlpha})`;
                ctx.font = "italic 10px 'Inter',sans-serif";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const narY = barY + BAR_H + GAP / 2 + 2;
                // Find the active category object
                const activeCat = categories.find(c => c.name === activeItem.parentName);
                if (activeCat) ctx.fillText(activeCat.narrative, chartL + chartW / 2, narY, chartW - 40);
            }

            // ─── SUMMARY (final beat) ───────────────────────────────────────────
            if (summaryP > 0) {
                const t = easeOut(summaryP);
                // Darken overlay
                ctx.fillStyle = `rgba(6,8,10,${t * 0.7})`;
                ctx.fillRect(0, 0, W, H);

                // Big summary
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = `rgba(226,232,240,${t})`;
                ctx.font = "700 42px 'Space Grotesk',sans-serif";
                ctx.fillText('Every hour accounted for.', W / 2, H / 2 - 40);
                ctx.fillStyle = `rgba(100,116,139,${t * 0.8})`;
                ctx.font = "400 14px 'Inter',sans-serif";
                ctx.fillText('284 hours → 4 categories → 11 actionable variables.', W / 2, H / 2 + 10);
                ctx.fillStyle = `rgba(245,158,11,${t * 0.6})`;
                ctx.font = "500 11px 'JetBrains Mono',monospace";
                ctx.fillText('This is what Enhanced OEE gives you: not just a number — a roadmap.', W / 2, H / 2 + 40);
            }

            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>

</html>
