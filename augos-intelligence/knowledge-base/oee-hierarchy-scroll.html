<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Loss Decomposition — Scroll to Reveal — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif
        }

        .scroll-space {
            height: 600vh
        }

        .fixed-viewport {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center
        }

        canvas {
            display: block
        }

        .progress-track {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            z-index: 100
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #64748B, #F59E0B, #D97706, #F43F5E, #3B82F6, #8B5CF6, #10B981)
        }

        .scroll-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: #334155;
            letter-spacing: .06em;
            z-index: 100;
            transition: opacity .3s
        }
    </style>
</head>

<body>
    <div class="scroll-space"></div>
    <div class="fixed-viewport"><canvas id="chart"></canvas></div>
    <div class="progress-track">
        <div class="progress-fill" id="pf"></div>
    </div>
    <div class="scroll-hint" id="hint">SCROLL TO DECOMPOSE ↓</div>
    <script>
const C=document.getElementById('chart'),ctx=C.getContext('2d');
const DPR=devicePixelRatio||1,W=1100,H=600;
C.width=W*DPR;C.height=H*DPR;C.style.width=W+'px';C.style.height=H+'px';
ctx.scale(DPR,DPR);

const hex=(h,a)=>`rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeIO=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function lerpColor(c1,c2,t){
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

const TOTAL=284,ML=40,MR=40,chartL=ML,chartW=W-ML-MR;
const BAR_Y=240,BAR_H=70;

const levels=[
    {label:'Total Loss',depth:0,desc:'284 hours of production never recovered',
     segs:[{n:'Total Loss',v:284,c:'#64748B'}]},
    {label:'OEE Categories',depth:1,desc:'The standard three: Availability · Performance · Quality',
     segs:[{n:'Availability',v:186,c:'#F59E0B'},{n:'Performance',v:72,c:'#3B82F6'},{n:'Quality',v:26,c:'#8B5CF6'}]},
    {label:'Sub-Categories',depth:2,desc:'Availability reveals Planned vs Unplanned downtime',
     segs:[{n:'Planned',v:42,c:'#D97706'},{n:'Unplanned',v:144,c:'#F43F5E'},{n:'Performance',v:72,c:'#3B82F6'},{n:'Quality',v:26,c:'#8B5CF6'}]},
    {label:'Resolution Path',depth:3,desc:'Who resolved it? Operator or Technician?',
     segs:[{n:'Plan. Eff.',v:28,c:'#CA8A04'},{n:'Op. Disc.',v:14,c:'#FBBF24'},{n:'Op. Resolved',v:58,c:'#FB923C'},{n:'Tech Intervention',v:86,c:'#DC2626'},{n:'Performance',v:72,c:'#3B82F6'},{n:'Quality',v:26,c:'#8B5CF6'}]},
    {label:'Time Account',depth:4,desc:'Every minute classified — evaluation, response, wrench, speed, quality',
     segs:[{n:'Plan. Eff.',v:28,c:'#CA8A04'},{n:'Op. Disc.',v:14,c:'#FBBF24'},{n:'Op. Resol.',v:58,c:'#FB923C'},{n:'Op. Eval.',v:10,c:'#FB7185'},{n:'Tech Resp.',v:16,c:'#EF4444'},{n:'Wrench',v:60,c:'#14B8A6'},{n:'Interruptions',v:24,c:'#60A5FA'},{n:'True Speed',v:48,c:'#6366F1'},{n:'Startup Rej.',v:14,c:'#A855F7'},{n:'In-Proc. Rej.',v:12,c:'#EC4899'}]},
    {label:'The Science',depth:5,desc:'11 variables. Each one actionable. Each one measurable.',
     segs:[{n:'Plan. Eff.',v:28,c:'#CA8A04'},{n:'Op. Disc.',v:14,c:'#FBBF24'},{n:'Op. Resol.',v:58,c:'#FB923C'},{n:'Op. Eval.',v:10,c:'#FB7185'},{n:'Tech Resp.',v:16,c:'#EF4444'},{n:'Active Wrench',v:38,c:'#10B981'},{n:'Inactive Wrench',v:22,c:'#EAB308'},{n:'Interruptions',v:24,c:'#60A5FA'},{n:'True Speed',v:48,c:'#6366F1'},{n:'Startup Rej.',v:14,c:'#A855F7'},{n:'In-Proc. Rej.',v:12,c:'#EC4899'}]},
];

function pos(segs){let cum=0;return segs.map(s=>{const l=cum/TOTAL*chartW+chartL;const w=s.v/TOTAL*chartW;cum+=s.v;return{...s,x:l,w,cx:l+w/2};});}
const allPos=levels.map(l=>pos(l.segs));
function parentMap(tgt,src){return tgt.map(t=>{const c=t.cx;const pi=src.findIndex(s=>c>=s.x&&c<s.x+s.w);return pi>=0?pi:src.length-1;});}
const pmaps=[];for(let i=0;i<levels.length-1;i++)pmaps.push(parentMap(allPos[i+1],allPos[i]));

function draw(){
    const s=window.scrollY,max=document.documentElement.scrollHeight-window.innerHeight;
    const p=clamp(s/max,0,1);
    document.getElementById('pf').style.width=(p*100)+'%';
    document.getElementById('hint').style.opacity=p<0.03?1:0;

    ctx.clearRect(0,0,W,H);

    // Map scroll to level transitions
    const nT=levels.length-1; // 5 transitions
    const scaled=p*nT;
    const curT=Math.min(Math.floor(scaled),nT-1);
    const t=easeIO(clamp(scaled-curT,0,1));

    const srcIdx=curT,tgtIdx=curT+1;
    const srcPos=allPos[srcIdx],tgtPos=allPos[tgtIdx];
    const pm=pmaps[srcIdx];
    const srcL=levels[srcIdx],tgtL=levels[tgtIdx];

    // ─── LEVEL INFO (crossfade) ─────────────────────────────────────────
    const showL=t<0.4?srcL:tgtL;
    const infoAlpha=t<0.3?1:(t<0.5?lerp(1,0.2,((t-0.3)/0.2)):lerp(0.2,1,(t-0.5)/0.5));

    // Step dots
    const dotY=50,dotSp=70,dotsL=W/2-(nT)*dotSp/2;
    for(let i=0;i<levels.length;i++){
        const dx=dotsL+i*dotSp;
        const done=i<(t<0.5?srcIdx:tgtIdx);
        const active=(t<0.5&&i===srcIdx)||(t>=0.5&&i===tgtIdx);
        if(i>0){ctx.strokeStyle=done||active?'rgba(245,158,11,.3)':'rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(dx-dotSp+6,dotY);ctx.lineTo(dx-6,dotY);ctx.stroke();}
        ctx.beginPath();ctx.arc(dx,dotY,active?5:3,0,Math.PI*2);
        ctx.fillStyle=active?'#F59E0B':(done?'rgba(245,158,11,.4)':'rgba(255,255,255,.06)');ctx.fill();
        if(active){ctx.shadowColor='#F59E0B';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;}
        ctx.fillStyle=active?'#F59E0B':'#334155';ctx.font="500 7px 'JetBrains Mono',monospace";ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('L'+i,dx,dotY+12);
    }

    ctx.globalAlpha=infoAlpha;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#E2E8F0';ctx.font="600 26px 'Space Grotesk',sans-serif";
    ctx.fillText(showL.label,W/2,110);
    ctx.fillStyle='#64748B';ctx.font="400 12px 'Inter',sans-serif";
    ctx.fillText(showL.desc,W/2,140);
    ctx.fillStyle='#334155';ctx.font="400 8px 'JetBrains Mono',monospace";
    ctx.fillText(showL.segs.length+' SEGMENTS',W/2,165);
    ctx.globalAlpha=1;

    // ─── THE BAR (morph) ────────────────────────────────────────────────
    // Background
    ctx.fillStyle='rgba(255,255,255,.015)';ctx.beginPath();ctx.roundRect(chartL,BAR_Y,chartW,BAR_H,10);ctx.fill();

    // Render target segments with morphed colors
    tgtPos.forEach((seg,i)=>{
        const parent=srcPos[pm[i]];
        const color=lerpColor(parent.c,seg.c,t);
        const r=i===0?[10,0,0,10]:i===tgtPos.length-1?[0,10,10,0]:[0,0,0,0];
        const g=ctx.createLinearGradient(seg.x,BAR_Y,seg.x,BAR_Y+BAR_H);
        g.addColorStop(0,hex(color,.85));g.addColorStop(1,hex(color,.65));
        ctx.fillStyle=g;ctx.shadowColor=hex(color,.1);ctx.shadowBlur=6;
        ctx.beginPath();ctx.roundRect(seg.x,BAR_Y,seg.w,BAR_H,r);ctx.fill();ctx.shadowBlur=0;
    });

    // Split flashes
    for(let i=1;i<tgtPos.length;i++){
        const isSibling=pm[i]===pm[i-1];
        if(isSibling){
            const flash=t<0.25?Math.sin(t/0.25*Math.PI)*0.7:0;
            const settle=clamp(t,0,1)*0.5;
            ctx.strokeStyle=`rgba(255,255,255,${flash})`;ctx.lineWidth=2;ctx.shadowColor='rgba(255,255,255,.6)';ctx.shadowBlur=flash*12;
            ctx.beginPath();ctx.moveTo(tgtPos[i].x,BAR_Y);ctx.lineTo(tgtPos[i].x,BAR_Y+BAR_H);ctx.stroke();ctx.shadowBlur=0;
            ctx.strokeStyle=`rgba(0,0,0,${settle})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tgtPos[i].x,BAR_Y+3);ctx.lineTo(tgtPos[i].x,BAR_Y+BAR_H-3);ctx.stroke();
        } else {
            ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tgtPos[i].x,BAR_Y+4);ctx.lineTo(tgtPos[i].x,BAR_Y+BAR_H-4);ctx.stroke();
        }
    }

    // ─── LABELS ─────────────────────────────────────────────────────────
    const labelSegs=t<0.35?srcPos:tgtPos;
    const la=t<0.15?1:(t<0.4?lerp(1,0,(t-0.15)/0.25):(t<0.5?0:lerp(0,1,(t-0.5)/0.3)));

    ctx.globalAlpha=Math.max(0.05,la);
    // In-bar labels
    labelSegs.forEach(seg=>{
        if(seg.w>50){
            ctx.fillStyle='rgba(255,255,255,.88)';ctx.font="600 10px 'Inter',sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText(seg.n,seg.cx,BAR_Y+BAR_H/2-6);
            ctx.fillStyle='rgba(255,255,255,.35)';ctx.font="400 8px 'JetBrains Mono',monospace";
            ctx.fillText(seg.v+'h',seg.cx,BAR_Y+BAR_H/2+8);
        } else if(seg.w>25){
            ctx.fillStyle='rgba(255,255,255,.5)';ctx.font="400 8px 'JetBrains Mono',monospace";ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText(seg.v+'h',seg.cx,BAR_Y+BAR_H/2);
        }
    });

    // Below-bar labels
    const blY=BAR_Y+BAR_H+16;
    const lbls=labelSegs.map(s=>({x:s.cx,idealX:s.cx,name:s.n,val:s.v+'h',color:s.c,tw:0}));
    ctx.font="500 8px 'Inter',sans-serif";
    lbls.forEach(l=>l.tw=Math.max(ctx.measureText(l.name).width+8,30));
    for(let pass=0;pass<4;pass++){for(let i=1;i<lbls.length;i++){const min=(lbls[i-1].tw+lbls[i].tw)/2+3;const gap=lbls[i].x-lbls[i-1].x;if(gap<min){const push=(min-gap)/2;lbls[i-1].x-=push;lbls[i].x+=push;}}}
    lbls.forEach(l=>{l.x=clamp(l.x,chartL+l.tw/2,chartL+chartW-l.tw/2);});

    lbls.forEach(l=>{
        if(Math.abs(l.x-l.idealX)>2){ctx.strokeStyle=hex(l.color,.15);ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(l.idealX,BAR_Y+BAR_H+2);ctx.lineTo(l.x,blY-2);ctx.stroke();}
        ctx.fillStyle=hex(l.color,.7);ctx.font="500 8px 'Inter',sans-serif";ctx.textAlign='center';ctx.textBaseline='top';
        ctx.fillText(l.name,l.x,blY);
        ctx.fillStyle=hex(l.color,.35);ctx.font="400 7px 'JetBrains Mono',monospace";
        ctx.fillText(l.val,l.x,blY+12);
    });
    ctx.globalAlpha=1;

    // Summary line
    ctx.fillStyle='#1E293B';ctx.font="400 8px 'JetBrains Mono',monospace";ctx.textAlign='center';ctx.textBaseline='top';
    const sumSegs=t<0.5?srcPos:tgtPos;
    const biggest=sumSegs.reduce((a,b)=>a.v>b.v?a:b);
    ctx.fillText(`LARGEST: ${biggest.n} (${biggest.v}h · ${(biggest.v/TOTAL*100).toFixed(0)}%)  ·  TOTAL: ${TOTAL}h`,W/2,BAR_Y+BAR_H+60+(lbls.length>6?20:0));

    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
    </script>
</body>

</html>
