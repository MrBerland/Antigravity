<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Drill-Down Doughnut — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 20px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 500px;
            margin: 0 auto
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            flex-wrap: wrap;
            justify-content: center
        }

        .crumb {
            color: #64748B;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all .2s
        }

        .crumb:hover {
            color: #F59E0B;
            background: rgba(245, 158, 11, .1)
        }

        .crumb.active {
            color: #F59E0B;
            background: rgba(245, 158, 11, .1)
        }

        .crumb-sep {
            color: #334155
        }

        canvas {
            display: block;
            cursor: pointer
        }

        .legend-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            justify-content: center;
            margin-top: 20px;
            max-width: 500px
        }

        .leg-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .72rem;
            color: #94A3B8;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background .2s
        }

        .leg-item:hover {
            background: rgba(255, 255, 255, .05)
        }

        .leg-sw {
            width: 10px;
            height: 10px;
            border-radius: 3px
        }

        .instructions {
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: #334155;
            margin-top: 12px;
            text-align: center
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 5 · Drill-Down Doughnut</div>
        <h1>Click to Explore <span>Deeper</span></h1>
        <p>Click any segment to drill into its children. Click the center or breadcrumb to go back up.</p>
    </div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <canvas id="chart"></canvas>
    <div class="legend-list" id="legend"></div>
    <div class="instructions">Click a segment to drill down · Click center to go back</div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const SIZE = 500;
        canvas.width = SIZE * DPR; canvas.height = SIZE * DPR;
        canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
        ctx.scale(DPR, DPR);
        const CX = SIZE / 2, CY = SIZE / 2, R_OUT = 200, R_IN = 110;
        const TAU = Math.PI * 2;

        const tree = {
            name: 'Total Loss', val: 284, color: '#94A3B8',
            children: [
                {
                    name: 'Availability Loss', val: 186, color: '#F59E0B', children: [
                        {
                            name: 'Planned', val: 42, color: '#D97706', children: [
                                { name: 'Planning Efficiency', val: 28, color: '#CA8A04' },
                                { name: 'Operator Discipline', val: 14, color: '#FBBF24' },
                            ]
                        },
                        {
                            name: 'Unplanned', val: 144, color: '#F43F5E', children: [
                                {
                                    name: 'Operator Resolved', val: 58, color: '#FB923C', children: [
                                        { name: 'Op. Resolution Time', val: 58, color: '#FB923C' },
                                    ]
                                },
                                {
                                    name: 'Technical Intervention', val: 86, color: '#DC2626', children: [
                                        { name: 'Op. Evaluation Time', val: 10, color: '#FB7185' },
                                        { name: 'Tech Response Time', val: 16, color: '#EF4444' },
                                        {
                                            name: 'Wrench Time', val: 60, color: '#14B8A6', children: [
                                                { name: 'Active Wrench', val: 38, color: '#10B981' },
                                                { name: 'Inactive Wrench', val: 22, color: '#EAB308' },
                                            ]
                                        },
                                    ]
                                },
                            ]
                        },
                    ]
                },
                {
                    name: 'Performance Loss', val: 72, color: '#3B82F6', children: [
                        { name: 'Interruptions', val: 24, color: '#60A5FA' },
                        { name: 'True Speed', val: 48, color: '#6366F1' },
                    ]
                },
                {
                    name: 'Quality Loss', val: 26, color: '#8B5CF6', children: [
                        { name: 'Startup Rejects', val: 14, color: '#A855F7' },
                        { name: 'In-Process Rejects', val: 12, color: '#EC4899' },
                    ]
                },
            ]
        };

        let currentNode = tree;
        let navStack = [];
        let arcs = [];
        let hovered = null;

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        function buildArcs() {
            arcs = [];
            if (!currentNode.children) return;
            const total = currentNode.children.reduce((s, c) => s + c.val, 0);
            let a = -Math.PI / 2;
            const gapAngle = 0.03;
            currentNode.children.forEach(child => {
                const sweep = (child.val / total) * TAU;
                arcs.push({
                    node: child,
                    a0: a + gapAngle / 2,
                    a1: a + sweep - gapAngle / 2,
                });
                a += sweep;
            });
        }

        function render() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // Center info
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.font = "600 32px 'Space Grotesk',sans-serif";
            ctx.fillText(currentNode.val + 'h', CX, CY - 12);
            ctx.fillStyle = '#64748B';
            ctx.font = "500 11px 'Inter',sans-serif";
            const centerName = currentNode.name.length > 18 ? currentNode.name.slice(0, 16) + '…' : currentNode.name;
            ctx.fillText(centerName, CX, CY + 12);
            if (navStack.length > 0) {
                ctx.fillStyle = '#334155';
                ctx.font = "400 10px 'JetBrains Mono',monospace";
                ctx.fillText('↑ click to go back', CX, CY + 30);
            }

            // Arcs
            arcs.forEach(arc => {
                const isHov = hovered === arc;
                const rOut = isHov ? R_OUT + 6 : R_OUT;
                ctx.beginPath();
                ctx.arc(CX, CY, R_IN, arc.a0, arc.a1);
                ctx.arc(CX, CY, rOut, arc.a1, arc.a0, true);
                ctx.closePath();

                const midA = (arc.a0 + arc.a1) / 2;
                const g = ctx.createRadialGradient(CX, CY, R_IN, CX, CY, rOut);
                g.addColorStop(0, hexRGBA(arc.node.color, 0.6));
                g.addColorStop(1, hexRGBA(arc.node.color, 0.95));
                ctx.fillStyle = g;
                ctx.fill();

                if (isHov) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Label
                const sweep = arc.a1 - arc.a0;
                if (sweep > 0.25) {
                    const labelR = (R_IN + rOut) / 2;
                    const lx = CX + Math.cos(midA) * labelR;
                    const ly = CY + Math.sin(midA) * labelR;
                    ctx.save();
                    ctx.translate(lx, ly);
                    let rot = midA;
                    if (rot > Math.PI / 2 && rot < Math.PI * 1.5) rot += Math.PI;
                    ctx.rotate(rot);
                    ctx.fillStyle = 'rgba(255,255,255,.95)';
                    ctx.font = "600 11px 'Inter',sans-serif";
                    ctx.textAlign = 'center';
                    const label = arc.node.name.length > 16 ? arc.node.name.slice(0, 14) + '…' : arc.node.name;
                    ctx.fillText(label, 0, -6);
                    ctx.fillStyle = 'rgba(255,255,255,.5)';
                    ctx.font = "400 10px 'JetBrains Mono',monospace";
                    ctx.fillText(arc.node.val + 'h', 0, 8);
                    ctx.restore();
                }
            });

            // Has-children indicator
            arcs.forEach(arc => {
                if (arc.node.children) {
                    const midA = (arc.a0 + arc.a1) / 2;
                    const ix = CX + Math.cos(midA) * (R_OUT + 14);
                    const iy = CY + Math.sin(midA) * (R_OUT + 14);
                    ctx.fillStyle = hexRGBA(arc.node.color, 0.4);
                    ctx.beginPath();
                    ctx.arc(ix, iy, 4, 0, TAU);
                    ctx.fill();
                }
            });
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = '';
            const trail = [...navStack.map(n => n.name), currentNode.name];
            trail.forEach((name, i) => {
                if (i > 0) {
                    const sep = document.createElement('span');
                    sep.className = 'crumb-sep';
                    sep.textContent = '›';
                    bc.appendChild(sep);
                }
                const c = document.createElement('span');
                c.className = 'crumb' + (i === trail.length - 1 ? ' active' : '');
                c.textContent = name;
                if (i < trail.length - 1) {
                    c.addEventListener('click', () => {
                        while (navStack.length > i) {
                            currentNode = navStack.pop() || tree;
                        }
                        if (i === 0) { currentNode = tree; navStack = []; }
                        buildArcs(); render(); updateBreadcrumb(); updateLegend();
                    });
                }
                bc.appendChild(c);
            });
        }

        function updateLegend() {
            const leg = document.getElementById('legend');
            leg.innerHTML = '';
            if (!currentNode.children) return;
            currentNode.children.forEach(child => {
                const d = document.createElement('div');
                d.className = 'leg-item';
                d.innerHTML = `<div class="leg-sw" style="background:${child.color}"></div>${child.name} <span style="font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#475569;margin-left:4px">${child.val}h</span>`;
                leg.appendChild(d);
            });
        }

        // Interaction
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const dx = mx - CX, dy = my - CY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);

            hovered = null;
            if (dist >= R_IN && dist <= R_OUT + 10) {
                for (const arc of arcs) {
                    let a = angle;
                    if (a < arc.a0 - 0.1) a += TAU;
                    if (a >= arc.a0 && a <= arc.a1) { hovered = arc; break; }
                }
            }
            canvas.style.cursor = (hovered || dist < R_IN) ? 'pointer' : 'default';
            render();
        });

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const dx = mx - CX, dy = my - CY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < R_IN && navStack.length > 0) {
                currentNode = navStack.pop();
                buildArcs(); render(); updateBreadcrumb(); updateLegend();
                return;
            }

            if (hovered && hovered.node.children) {
                navStack.push(currentNode);
                currentNode = hovered.node;
                hovered = null;
                buildArcs(); render(); updateBreadcrumb(); updateLegend();
            }
        });

        canvas.addEventListener('mouseleave', () => { hovered = null; render(); });

        buildArcs(); render(); updateBreadcrumb(); updateLegend();
    </script>
</body>

</html>
