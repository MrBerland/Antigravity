<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Loss Sunburst — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 24px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 500px;
            margin: 0 auto
        }

        canvas {
            display: block;
            cursor: pointer
        }

        .tooltip {
            position: fixed;
            background: rgba(14, 17, 22, .95);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: .8rem;
            color: #E2E8F0;
            pointer-events: none;
            opacity: 0;
            transition: opacity .15s;
            z-index: 10;
            backdrop-filter: blur(8px)
        }

        .tooltip .tt-name {
            font-weight: 600;
            margin-bottom: 4px
        }

        .tooltip .tt-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: #94A3B8
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 1 · Sunburst</div>
        <h1>Loss Decomposition <span>Radial View</span></h1>
        <p>Each ring represents a deeper level of analysis. Hover to explore the hierarchy.</p>
    </div>
    <canvas id="chart"></canvas>
    <div class="tooltip" id="tip"></div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const tip = document.getElementById('tip');
        const DPR = window.devicePixelRatio || 1;
        const SIZE = 700;
        canvas.width = SIZE * DPR; canvas.height = SIZE * DPR;
        canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
        ctx.scale(DPR, DPR);
        const CX = SIZE / 2, CY = SIZE / 2;

        const TAU = Math.PI * 2;

        // Hierarchical data
        const tree = {
            name: 'Total Loss', val: 284, color: '#E2E8F0',
            children: [
                {
                    name: 'Availability Loss', val: 186, color: '#F59E0B', children: [
                        {
                            name: 'Planned', val: 42, color: '#D97706', children: [
                                { name: 'Planning Efficiency', val: 28, color: '#CA8A04' },
                                { name: 'Operator Discipline', val: 14, color: '#FBBF24' },
                            ]
                        },
                        {
                            name: 'Unplanned', val: 144, color: '#F43F5E', children: [
                                {
                                    name: 'Operator Resolved', val: 58, color: '#FB923C', children: [
                                        { name: 'Op. Resolution Time', val: 58, color: '#FB923C' },
                                    ]
                                },
                                {
                                    name: 'Technical Intervention', val: 86, color: '#DC2626', children: [
                                        { name: 'Op. Evaluation Time', val: 10, color: '#FB7185' },
                                        { name: 'Tech Response Time', val: 16, color: '#EF4444' },
                                        {
                                            name: 'Wrench Time', val: 60, color: '#14B8A6', children: [
                                                { name: 'Active Wrench', val: 38, color: '#10B981' },
                                                { name: 'Inactive Wrench', val: 22, color: '#EAB308' },
                                            ]
                                        },
                                    ]
                                },
                            ]
                        },
                    ]
                },
                {
                    name: 'Performance Loss', val: 72, color: '#3B82F6', children: [
                        { name: 'Interruptions', val: 24, color: '#60A5FA' },
                        { name: 'True Speed', val: 48, color: '#6366F1' },
                    ]
                },
                {
                    name: 'Quality Loss', val: 26, color: '#8B5CF6', children: [
                        { name: 'Startup Rejects', val: 14, color: '#A855F7' },
                        { name: 'In-Process Rejects', val: 12, color: '#EC4899' },
                    ]
                },
            ]
        };

        // Flatten to arcs
        const arcs = [];
        const innerR = 60, ringW = 52, gap = 2;

        function buildArcs(node, depth, startAngle, sweep, parent) {
            if (!node.children) return;
            const total = node.children.reduce((s, c) => s + c.val, 0);
            let a = startAngle;
            node.children.forEach(child => {
                const childSweep = (child.val / total) * sweep;
                const gapAngle = gap / (innerR + depth * ringW);
                const arc = {
                    name: child.name, val: child.val, color: child.color,
                    depth, r0: innerR + depth * ringW, r1: innerR + (depth + 1) * ringW - 3,
                    a0: a + gapAngle / 2, a1: a + childSweep - gapAngle / 2,
                    parent: parent
                };
                arcs.push(arc);
                if (child.children) buildArcs(child, depth + 1, a, childSweep, child.name);
                a += childSweep;
            });
        }
        buildArcs(tree, 0, -Math.PI / 2, TAU, 'Total Loss');

        function hexRGBA(h, a) {
            return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`;
        }

        let hovered = null;

        function render() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            // Center label
            ctx.fillStyle = '#fff';
            ctx.font = "600 28px 'Space Grotesk',sans-serif";
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('284h', CX, CY - 8);
            ctx.fillStyle = '#64748B';
            ctx.font = "500 11px 'JetBrains Mono',monospace";
            ctx.fillText('TOTAL LOSS', CX, CY + 14);

            arcs.forEach(arc => {
                const isHov = hovered === arc;
                const alpha = hovered ? (isHov ? 1 : 0.35) : 0.85;
                ctx.beginPath();
                ctx.arc(CX, CY, arc.r0, arc.a0, arc.a1);
                ctx.arc(CX, CY, arc.r1, arc.a1, arc.a0, true);
                ctx.closePath();
                ctx.fillStyle = hexRGBA(arc.color, alpha);
                ctx.fill();

                if (isHov) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Label for wider arcs
                const sweep = arc.a1 - arc.a0;
                const midA = (arc.a0 + arc.a1) / 2;
                const midR = (arc.r0 + arc.r1) / 2;
                if (sweep > 0.15 && arc.r1 - arc.r0 > 20) {
                    ctx.save();
                    ctx.translate(CX + Math.cos(midA) * midR, CY + Math.sin(midA) * midR);
                    let rot = midA;
                    if (rot > Math.PI / 2 && rot < Math.PI * 1.5) rot += Math.PI;
                    ctx.rotate(rot);
                    ctx.fillStyle = alpha > 0.5 ? '#fff' : 'rgba(255,255,255,0.3)';
                    ctx.font = `500 ${sweep > 0.4 ? 10 : 9}px 'Inter',sans-serif`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const label = arc.name.length > 14 ? arc.name.slice(0, 12) + '…' : arc.name;
                    ctx.fillText(label, 0, 0);
                    ctx.restore();
                }
            });
        }

        render();

        // Hover
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const dx = mx - CX, dy = my - CY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);
            if (angle < -Math.PI / 2) angle += TAU;

            hovered = null;
            for (let i = arcs.length - 1; i >= 0; i--) {
                const a = arcs[i];
                if (dist >= a.r0 && dist <= a.r1 && angle >= a.a0 && angle <= a.a1) {
                    hovered = a; break;
                }
            }

            if (hovered) {
                tip.style.opacity = '1';
                tip.style.left = (e.clientX + 16) + 'px';
                tip.style.top = (e.clientY - 20) + 'px';
                tip.innerHTML = `<div class="tt-name">${hovered.name}</div><div class="tt-val">${hovered.val}h · ${(hovered.val / 284 * 100).toFixed(1)}% of total loss</div>`;
                canvas.style.cursor = 'pointer';
            } else {
                tip.style.opacity = '0';
                canvas.style.cursor = 'default';
            }
            render();
        });

        canvas.addEventListener('mouseleave', () => {
            hovered = null; tip.style.opacity = '0'; render();
        });
    </script>
</body>

</html>
