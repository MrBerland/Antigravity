<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Waterfall + Bar V3 — A·P·Q Top + Layered — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 28px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 680px;
            margin: 0 auto;
            line-height: 1.6
        }

        canvas {
            display: block
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">V3 · A·P·Q Top + Layered Breakdown</div>
        <h1>Standard to Enhanced <span>in Three Steps</span></h1>
        <p>Top bar shows three standard OEE categories. A second bar splits Availability into Planned vs Unplanned. The
            waterfall then decomposes all four sub-categories into actionable variables.</p>
    </div>
    <canvas id="chart"></canvas>
    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;
        const W = 1100, H = 820;
        canvas.width = W * DPR; canvas.height = H * DPR;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.scale(DPR, DPR);
        function hexRGBA(h, a) { return `rgba(${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)},${a})`; }

        const TOTAL = 284, ML = 60, MR = 30, MT = 0, MB = 80;
        const chartL = ML, chartR = W - MR, chartW = chartR - chartL;

        const subCats = [
            {
                name: 'Planned', val: 42, color: '#D97706', topParent: 'Availability', items: [
                    { name: 'Plan.\nEfficiency', val: 28, color: '#CA8A04' },
                    { name: 'Op.\nDiscipline', val: 14, color: '#FBBF24' },
                ]
            },
            {
                name: 'Unplanned', val: 144, color: '#F43F5E', topParent: 'Availability', items: [
                    { name: 'Op. Resol.\nTime', val: 58, color: '#FB923C' },
                    { name: 'Op. Eval.\nTime', val: 10, color: '#FB7185' },
                    { name: 'Tech Resp.\nTime', val: 16, color: '#EF4444' },
                    { name: 'Active\nWrench', val: 38, color: '#10B981' },
                    { name: 'Inactive\nWrench', val: 22, color: '#EAB308' },
                ]
            },
            {
                name: 'Performance', val: 72, color: '#3B82F6', topParent: 'Performance', items: [
                    { name: 'Inter-\nruptions', val: 24, color: '#60A5FA' },
                    { name: 'True\nSpeed', val: 48, color: '#6366F1' },
                ]
            },
            {
                name: 'Quality', val: 26, color: '#8B5CF6', topParent: 'Quality', items: [
                    { name: 'Startup\nRejects', val: 14, color: '#A855F7' },
                    { name: 'In-Proc.\nRejects', val: 12, color: '#EC4899' },
                ]
            },
        ];
        const topCats = [
            { name: 'Availability', val: 186, color: '#F59E0B', subIndices: [0, 1] },
            { name: 'Performance', val: 72, color: '#3B82F6', subIndices: [2] },
            { name: 'Quality', val: 26, color: '#8B5CF6', subIndices: [3] },
        ];

        // Full-width child-up layout
        const N = 11, catGap = 14, subGap = 10, itemGap = 4;
        const nSubGaps = subCats.length - 1; // 3 gaps between sub-cats
        // Between Planned-Unplanned: subGap (same top parent), Unplanned-Performance: catGap, Performance-Quality: catGap
        const totalGapW = subGap + catGap + catGap; // = 38
        const nIG = subCats.reduce((s, c) => s + Math.max(0, c.items.length - 1), 0); // 1+4+1+1 = 7
        const wfBarW = (chartW - totalGapW - nIG * itemGap) / N;

        const wfPositions = []; let cx = chartL; const subSpans = [];
        subCats.forEach((sc, si) => {
            const cl = cx;
            sc.items.forEach((_, ii) => { wfPositions.push({ x: cx, w: wfBarW }); cx += wfBarW; if (ii < sc.items.length - 1) cx += itemGap; });
            const cr = cx; subSpans.push({ left: cl, right: cr, w: cr - cl, cx: (cl + cr) / 2 });
            if (si < subCats.length - 1) {
                const next = subCats[si + 1].topParent, curr = sc.topParent;
                cx += (next !== curr) ? catGap : subGap;
            }
        });

        const topSpans = [];
        topCats.forEach(tc => {
            const f = subSpans[tc.subIndices[0]], l = subSpans[tc.subIndices[tc.subIndices.length - 1]];
            topSpans.push({ left: f.left, right: l.right, w: l.right - f.left, cx: (f.left + l.right) / 2 });
        });

        const BAR1_H = 44, barY1 = MT + 10, GAP1 = 34, BAR2_H = 36;
        const barY2 = barY1 + BAR1_H + GAP1;
        const GAP2 = 44, wfTop = barY2 + BAR2_H + GAP2 + 20;
        const wfH = H - wfTop - MB, wfScale = wfH / 300;

        // Gradient shading (behind everything)
        subCats.forEach((sc, si) => {
            const sp = subSpans[si]; const st = barY2 + BAR2_H; const sb = wfTop + wfH + 20;
            const g = ctx.createLinearGradient(0, st, 0, sb);
            g.addColorStop(0, hexRGBA(sc.color, 0.07)); g.addColorStop(0.25, hexRGBA(sc.color, 0.03));
            g.addColorStop(0.6, hexRGBA(sc.color, 0.01)); g.addColorStop(1, hexRGBA(sc.color, 0.0));
            ctx.fillStyle = g; ctx.fillRect(sp.left, st, sp.w, sb - st);
        });

        // Bar 1: A·P·Q
        ctx.fillStyle = '#334155'; ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.fillText('STANDARD OEE · 3 CATEGORIES', chartL, barY1 - 6);
        ctx.textAlign = 'right'; ctx.fillText(TOTAL + 'H TOTAL LOSS', chartR, barY1 - 6);
        topCats.forEach((tc, ti) => {
            const sp = topSpans[ti];
            const g = ctx.createLinearGradient(sp.left, barY1, sp.left, barY1 + BAR1_H);
            g.addColorStop(0, hexRGBA(tc.color, 0.85)); g.addColorStop(1, hexRGBA(tc.color, 0.65));
            ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(sp.left, barY1, sp.w, BAR1_H, 6); ctx.fill();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,.95)'; ctx.font = "600 11px 'Inter',sans-serif";
            ctx.fillText(tc.name, sp.cx, barY1 + BAR1_H / 2 - 7);
            ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.font = "400 9px 'JetBrains Mono',monospace";
            ctx.fillText(tc.val + 'h · ' + (tc.val / TOTAL * 100).toFixed(0) + '%', sp.cx, barY1 + BAR1_H / 2 + 8);
        });

        // Connector Bar1→Bar2
        const cT = barY1 + BAR1_H, cB = barY2;
        const aS = topSpans[0], pS = subSpans[0], uS = subSpans[1], pF = 42 / 186;
        ctx.fillStyle = hexRGBA('#D97706', 0.06);
        ctx.beginPath();
        ctx.moveTo(aS.left, cT); ctx.bezierCurveTo(aS.left, cT + 16, pS.left, cB - 12, pS.left, cB);
        ctx.lineTo(pS.right, cB); ctx.bezierCurveTo(pS.right, cB - 12, aS.left + aS.w * pF, cT + 16, aS.left + aS.w * pF, cT);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = hexRGBA('#F43F5E', 0.06);
        ctx.beginPath();
        ctx.moveTo(aS.left + aS.w * pF, cT); ctx.bezierCurveTo(aS.left + aS.w * pF, cT + 16, uS.left, cB - 12, uS.left, cB);
        ctx.lineTo(uS.right, cB); ctx.bezierCurveTo(uS.right, cB - 12, aS.right, cT + 16, aS.right, cT);
        ctx.closePath(); ctx.fill();
        [1, 2].forEach(ti => {
            const ts = topSpans[ti], ss = subSpans[ti + 1];
            ctx.fillStyle = hexRGBA(topCats[ti].color, 0.04);
            ctx.fillRect(Math.min(ts.left, ss.left), cT, Math.max(ts.w, ss.w), cB - cT);
        });
        ctx.fillStyle = '#1E293B'; ctx.font = "400 7px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('▼ AVAILABILITY → PLANNED + UNPLANNED ▼', aS.cx, cT + (cB - cT) / 2);

        // Bar 2
        ctx.fillStyle = '#334155'; ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.fillText('SUB-CATEGORIES · 4 SEGMENTS', chartL, barY2 - 6);
        subCats.forEach((sc, si) => {
            const sp = subSpans[si];
            const g = ctx.createLinearGradient(sp.left, barY2, sp.left, barY2 + BAR2_H);
            g.addColorStop(0, hexRGBA(sc.color, 0.8)); g.addColorStop(1, hexRGBA(sc.color, 0.6));
            ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(sp.left, barY2, sp.w, BAR2_H, 5); ctx.fill();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.font = "600 10px 'Inter',sans-serif";
            ctx.fillText(sc.name, sp.cx, barY2 + BAR2_H / 2 - 5);
            ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.fillText(sc.val + 'h', sp.cx, barY2 + BAR2_H / 2 + 7);
        });

        ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('▼  DECOMPOSED INTO 11 VARIABLES  ▼', chartL + chartW / 2, barY2 + BAR2_H + GAP2 / 2);
        ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
        for (let v = 0; v <= 300; v += 50) {
            const y = wfTop + wfH - v * wfScale;
            ctx.beginPath(); ctx.moveTo(chartL, y); ctx.lineTo(chartR, y); ctx.stroke();
            ctx.fillStyle = '#1E293B'; ctx.font = "400 8px 'JetBrains Mono',monospace";
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(v + 'h', chartL - 8, y);
        }

        // Waterfall bars
        let running = TOTAL; let gi = 0;
        subCats.forEach(sc => {
            sc.items.forEach(item => {
                const pos = wfPositions[gi]; const x = pos.x;
                const barH = item.val * wfScale; const topY = wfTop + wfH - running * wfScale; const bottomY = topY + barH;
                if (gi > 0) {
                    ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                    ctx.beginPath(); ctx.moveTo(wfPositions[gi - 1].x + wfBarW, topY); ctx.lineTo(x, topY); ctx.stroke(); ctx.setLineDash([]);
                }
                ctx.shadowColor = hexRGBA(item.color, 0.12); ctx.shadowBlur = 8;
                const g = ctx.createLinearGradient(x, topY, x, bottomY);
                g.addColorStop(0, hexRGBA(item.color, 0.5)); g.addColorStop(1, hexRGBA(item.color, 0.9));
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(x, topY, wfBarW, barH, 3); ctx.fill();
                ctx.shadowBlur = 0; ctx.strokeStyle = hexRGBA(item.color, 0.2); ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = hexRGBA(item.color, 1); ctx.font = "600 9px 'JetBrains Mono',monospace";
                ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText('−' + item.val + 'h', x + wfBarW / 2, bottomY + 3);
                running -= item.val;
                ctx.fillStyle = '#334155'; ctx.font = "400 7px 'JetBrains Mono',monospace"; ctx.fillText(running + 'h', x + wfBarW / 2, bottomY + 15);
                ctx.fillStyle = '#94A3B8'; ctx.font = "500 7.5px 'Inter',sans-serif"; ctx.textBaseline = 'top';
                const lY = wfTop + wfH + 10; item.name.split('\n').forEach((l, li) => ctx.fillText(l, x + wfBarW / 2, lY + li * 10));
                gi++;
            });
        });

        const glY = wfTop + wfH + 40;
        subCats.forEach((sc, si) => {
            const sp = subSpans[si]; ctx.strokeStyle = hexRGBA(sc.color, 0.25); ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(sp.left, glY); ctx.lineTo(sp.right, glY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sp.left, glY - 3); ctx.lineTo(sp.left, glY + 3); ctx.moveTo(sp.right, glY - 3); ctx.lineTo(sp.right, glY + 3); ctx.stroke();
            ctx.fillStyle = hexRGBA(sc.color, 0.5); ctx.font = "500 7.5px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText(sc.name + ' · ' + sc.val + 'h', sp.cx, glY + 5);
        });
    </script>
</body>

</html>
