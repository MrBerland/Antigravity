<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OEE Loss Icicle — Augos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #06080A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh
        }

        .title {
            text-align: center;
            margin-bottom: 24px
        }

        .title .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: #F59E0B;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 12px
        }

        .title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px
        }

        .title h1 span {
            color: #94A3B8;
            font-weight: 300
        }

        .title p {
            font-size: .85rem;
            color: #64748B;
            max-width: 600px;
            margin: 0 auto
        }

        .icicle {
            width: 100%;
            max-width: 1000px
        }

        .ice-row {
            display: flex;
            height: 48px;
            margin-bottom: 2px;
            border-radius: 4px;
            overflow: hidden
        }

        .ice-seg {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: filter .2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-width: 1px
        }

        .ice-seg:hover {
            filter: brightness(1.3);
            z-index: 5
        }

        .ice-seg .s-name {
            font-size: .7rem;
            font-weight: 600;
            color: rgba(255, 255, 255, .9);
            white-space: nowrap
        }

        .ice-seg .s-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: rgba(255, 255, 255, .5)
        }

        .depth-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .55rem;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 4px;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <div class="title">
        <div class="tag">Visualisation 4 · Icicle Partition</div>
        <h1>Hierarchical Bars <span>· Level by Level</span></h1>
        <p>Each row is a level of the hierarchy. Children are aligned directly under their parents. Width = hours
            consumed.</p>
    </div>
    <div class="icicle" id="icicle"></div>

    <script>
        const TOTAL = 284;
        const container = document.getElementById('icicle');

        // Build levels — each item has a left offset (%) and width (%)
        function pct(val) { return (val / TOTAL * 100); }

        const levels = [
            // Level 0: Total
            {
                label: 'TOTAL LOSS', items: [
                    { name: 'Total Loss', val: 284, color: '#94A3B8', left: 0, w: 100 }
                ]
            },
            // Level 1: A, P, Q
            {
                label: 'A · P · Q', items: [
                    { name: 'Availability', val: 186, color: '#F59E0B', left: 0, w: pct(186) },
                    { name: 'Performance', val: 72, color: '#3B82F6', left: pct(186), w: pct(72) },
                    { name: 'Quality', val: 26, color: '#8B5CF6', left: pct(186 + 72), w: pct(26) },
                ]
            },
            // Level 2: Sub-categories
            {
                label: 'CATEGORY', items: [
                    { name: 'Planned', val: 42, color: '#D97706', left: 0, w: pct(42) },
                    { name: 'Unplanned', val: 144, color: '#F43F5E', left: pct(42), w: pct(144) },
                    { name: 'Interruptions', val: 24, color: '#60A5FA', left: pct(186), w: pct(24) },
                    { name: 'True Speed', val: 48, color: '#6366F1', left: pct(186 + 24), w: pct(48) },
                    { name: 'Startup Rej.', val: 14, color: '#A855F7', left: pct(186 + 72), w: pct(14) },
                    { name: 'In-Process Rej.', val: 12, color: '#EC4899', left: pct(186 + 72 + 14), w: pct(12) },
                ]
            },
            // Level 3: Resolution path
            {
                label: 'RESOLUTION PATH', items: [
                    { name: 'Plan. Efficiency', val: 28, color: '#CA8A04', left: 0, w: pct(28) },
                    { name: 'Op. Discipline', val: 14, color: '#FBBF24', left: pct(28), w: pct(14) },
                    { name: 'Op. Resolved', val: 58, color: '#FB923C', left: pct(42), w: pct(58) },
                    { name: 'Tech Intervention', val: 86, color: '#DC2626', left: pct(42 + 58), w: pct(86) },
                    // P & Q pass through
                    { name: 'Interruptions', val: 24, color: '#60A5FA', left: pct(186), w: pct(24) },
                    { name: 'True Speed', val: 48, color: '#6366F1', left: pct(186 + 24), w: pct(48) },
                    { name: 'Startup Rej.', val: 14, color: '#A855F7', left: pct(186 + 72), w: pct(14) },
                    { name: 'In-Process Rej.', val: 12, color: '#EC4899', left: pct(186 + 72 + 14), w: pct(12) },
                ]
            },
            // Level 4: Time account
            {
                label: 'TIME ACCOUNT', items: [
                    { name: 'Plan. Efficiency', val: 28, color: '#CA8A04', left: 0, w: pct(28) },
                    { name: 'Op. Discipline', val: 14, color: '#FBBF24', left: pct(28), w: pct(14) },
                    { name: 'Op. Resolution Time', val: 58, color: '#FB923C', left: pct(42), w: pct(58) },
                    { name: 'Op. Evaluation', val: 10, color: '#FB7185', left: pct(100), w: pct(10) },
                    { name: 'Tech Response', val: 16, color: '#EF4444', left: pct(110), w: pct(16) },
                    { name: 'Wrench Time', val: 60, color: '#14B8A6', left: pct(126), w: pct(60) },
                    { name: 'Interruptions', val: 24, color: '#60A5FA', left: pct(186), w: pct(24) },
                    { name: 'True Speed', val: 48, color: '#6366F1', left: pct(186 + 24), w: pct(48) },
                    { name: 'Startup Rej.', val: 14, color: '#A855F7', left: pct(186 + 72), w: pct(14) },
                    { name: 'In-Process Rej.', val: 12, color: '#EC4899', left: pct(186 + 72 + 14), w: pct(12) },
                ]
            },
            // Level 5: Detail
            {
                label: 'THE SCIENCE', items: [
                    { name: 'Plan. Efficiency', val: 28, color: '#CA8A04', left: 0, w: pct(28) },
                    { name: 'Op. Discipline', val: 14, color: '#FBBF24', left: pct(28), w: pct(14) },
                    { name: 'Op. Resolution', val: 58, color: '#FB923C', left: pct(42), w: pct(58) },
                    { name: 'Op. Evaluation', val: 10, color: '#FB7185', left: pct(100), w: pct(10) },
                    { name: 'Tech Response', val: 16, color: '#EF4444', left: pct(110), w: pct(16) },
                    { name: 'Active Wrench', val: 38, color: '#10B981', left: pct(126), w: pct(38) },
                    { name: 'Inactive Wrench', val: 22, color: '#EAB308', left: pct(164), w: pct(22) },
                    { name: 'Interruptions', val: 24, color: '#60A5FA', left: pct(186), w: pct(24) },
                    { name: 'True Speed', val: 48, color: '#6366F1', left: pct(186 + 24), w: pct(48) },
                    { name: 'Startup Rej.', val: 14, color: '#A855F7', left: pct(186 + 72), w: pct(14) },
                    { name: 'In-Process Rej.', val: 12, color: '#EC4899', left: pct(186 + 72 + 14), w: pct(12) },
                ]
            },
        ];

        levels.forEach(level => {
            const lbl = document.createElement('div');
            lbl.className = 'depth-label';
            lbl.textContent = level.label;
            container.appendChild(lbl);

            const row = document.createElement('div');
            row.className = 'ice-row';
            row.style.position = 'relative';

            level.items.forEach(item => {
                const seg = document.createElement('div');
                seg.className = 'ice-seg';
                seg.style.position = 'absolute';
                seg.style.left = item.left + '%';
                seg.style.width = item.w + '%';
                seg.style.height = '100%';
                seg.style.background = item.color;

                if (item.w > 6) {
                    const inner = item.w > 12
                        ? `<span class="s-name">${item.name}</span><span class="s-val">${item.val}h</span>`
                        : `<span class="s-val">${item.val}h</span>`;
                    seg.innerHTML = inner;
                }
                seg.title = `${item.name}: ${item.val}h (${(item.val / TOTAL * 100).toFixed(1)}%)`;
                row.appendChild(seg);
            });

            container.appendChild(row);
        });
    </script>
</body>

</html>
